<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>Batch review D: 10 new figures</title><style>
:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--text-on-accent:#0e120d;--accent:#9bcf3b;--accent-strong:#6f9a2c;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4;--accent-2:#b98bd9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem 2.2rem 4rem}
h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:1.4rem;margin:0 0 .3rem}.lead{color:var(--text-muted);font-size:.82rem;max-width:80ch;line-height:1.5;margin:.2rem 0 1.4rem}
.grid{display:grid;grid-template-columns:1fr;gap:1.1rem;max-width:900px}.card{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface)}
figcaption{padding:.55rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.fid{font-size:.62rem;font-weight:700;color:var(--accent);border:1px solid var(--accent-strong);border-radius:5px;padding:.05rem .4rem}
.sec{font-size:.6rem;color:var(--text-muted);border:1px solid var(--border-strong);border-radius:5px;padding:.05rem .4rem}.ttl{font-size:.8rem;color:var(--text-secondary)}
.body{padding:.8rem;background:var(--surface-3);overflow-x:auto}.body svg{display:block;width:100%;height:auto;min-width:660px}
</style></head><body><h1>Batch review D: 10 new figures</h1>
<p class="lead">Ten more buildable-backlog figures across Modules 1, 2, 5, 6, 7, 9, 14, 16, and 17. Each is bound to its module, rendered in both editions, and passes the drift and typography guards. Illustrative values are labeled on each figure.</p>
<div class="grid"><figure class="card"><figcaption><span class="fid">F-M1-2</span><span class="sec">Section 6</span><span class="ttl">Concept of operations (ConOps)</span></figcaption><div class="body"><svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The concept of operations as a narrative: a drive-over rover straddles a bed, detects mature fruit ahead, brings each to a fixed pick station, grasps it with a compliant fluid-powered end-effector, and transfers it to a trailer, all on-robot with a human supervising; every later requirement traces to a sentence, and the narrative decomposes into the signal-to-action spine." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Concept of operations (ConOps): the root of traceability</text>
<rect x="30" y="52" width="138" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="99.0" y="72" font-size="8.4" fill="var(--info)" font-weight="700" text-anchor="middle">straddle</text>
<text x="99.0" y="88" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">the bed, travel at walking</text>
<text x="99.0" y="97" font-size="6.2" fill="var(--text-muted)" text-anchor="middle"> pace</text>
<line x1="168" y1="78" x2="176" y2="78" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="176" y="52" width="138" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="245.0" y="72" font-size="8.4" fill="var(--info)" font-weight="700" text-anchor="middle">detect</text>
<text x="245.0" y="88" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">mature fruit ahead</text>
<line x1="314" y1="78" x2="322" y2="78" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="322" y="52" width="138" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="391.0" y="72" font-size="8.4" fill="var(--info)" font-weight="700" text-anchor="middle">stage</text>
<text x="391.0" y="88" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">bring each to the fixed pi</text>
<text x="391.0" y="97" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">ck station</text>
<line x1="460" y1="78" x2="468" y2="78" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="468" y="52" width="138" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="537.0" y="72" font-size="8.4" fill="var(--info)" font-weight="700" text-anchor="middle">grasp</text>
<text x="537.0" y="88" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">compliant fluid-powered en</text>
<text x="537.0" y="97" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">d-effector</text>
<line x1="606" y1="78" x2="614" y2="78" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="614" y="52" width="138" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="683.0" y="72" font-size="8.4" fill="var(--info)" font-weight="700" text-anchor="middle">transfer</text>
<text x="683.0" y="88" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">to the side-towed trailer</text>
<text x="20" y="128" font-size="7.4" fill="var(--text-muted)">all perception and control run on-robot (no network in the loop); a human supervises, does not tele-operate.</text>
<rect x="30" y="150" width="138" height="30" rx="6" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.2"/>
<text x="99.0" y="169" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">PERCEIVE</text>
<line x1="168" y1="165" x2="176" y2="165" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="176" y="150" width="138" height="30" rx="6" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.2"/>
<text x="245.0" y="169" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">DECIDE</text>
<line x1="314" y1="165" x2="322" y2="165" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="322" y="150" width="138" height="30" rx="6" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)" stroke-width="1.2"/>
<text x="391.0" y="169" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">ACT</text>
<line x1="460" y1="165" x2="468" y2="165" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="468" y="150" width="138" height="30" rx="6" fill="var(--warn)" fill-opacity="0.14" stroke="var(--warn)" stroke-width="1.2"/>
<text x="537.0" y="169" font-size="8" fill="var(--warn)" font-weight="700" text-anchor="middle">INTEGRATE</text>
<line x1="606" y1="165" x2="614" y2="165" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="614" y="150" width="138" height="30" rx="6" fill="var(--warn)" fill-opacity="0.14" stroke="var(--warn)" stroke-width="1.2"/>
<text x="683.0" y="169" font-size="8" fill="var(--warn)" font-weight="700" text-anchor="middle">DEPLOY</text>
<text x="20" y="144" font-size="7" fill="var(--accent)">decomposing the ConOps by function yields the signal-to-action spine (CEC-01):</text>
<text x="20" y="206" font-size="7.8" fill="var(--text-secondary)" font-weight="700">Every later requirement, budget, and subsystem is traceable to a sentence in the narrative.</text>
<text x="20" y="220" font-size="7.8" fill="var(--text-muted)">That is the point of a ConOps: it is the root of the traceability tree, and the spine follows the flow of information through the machine. Sections 6.3 and 6.4.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M2-2</span><span class="sec">Section 6</span><span class="ttl">Two damage modes: quasi-static vs impact</span></figcaption><div class="body"><svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two bruising modes matter to a harvester: quasi-static grip damage, where sustained contact pressure exceeds the tissue failure pressure and the controlling variable is peak contact pressure, not total force; and dynamic impact damage, where a drop delivers kinetic energy and the controlling variable is impact energy, which sets a maximum safe placement height and is why the mission lowers fruit rather than dropping it." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Two damage modes: quasi-static vs impact</text>
<rect x="30" y="54" width="345" height="150" rx="10" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<text x="46" y="74" font-size="9" fill="var(--info)" font-weight="700">QUASI-STATIC (grip) damage</text>
<text x="46" y="92" font-size="7" fill="var(--text-secondary)">sustained contact pressure exceeds the</text>
<text x="46" y="103" font-size="7" fill="var(--text-secondary)">rind/tissue failure pressure.</text>
<text x="46" y="124" font-size="7.6" fill="var(--accent)" font-weight="700">controlling variable: peak contact pressure</text>
<text x="46" y="137" font-size="6.8" fill="var(--text-muted)">(NOT total force)</text>
<text x="46" y="158" font-size="7" fill="var(--text-secondary)">lever: contact area, compliance -> how the</text>
<text x="46" y="169" font-size="7" fill="var(--text-secondary)">force is applied matters as much as how much.</text>
<text x="46" y="190" font-size="7.4" fill="var(--danger-text)" font-weight="700">threshold: bruise pressure p_br</text>
<rect x="385" y="54" width="345" height="150" rx="10" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.5"/>
<text x="401" y="74" font-size="9" fill="var(--warn-text)" font-weight="700">DYNAMIC (impact) damage</text>
<text x="401" y="92" font-size="7" fill="var(--text-secondary)">a drop or hard placement delivers kinetic</text>
<text x="401" y="103" font-size="7" fill="var(--text-secondary)">energy to a small contact region.</text>
<text x="401" y="124" font-size="7.6" fill="var(--accent)" font-weight="700">controlling variable: impact energy</text>
<text x="401" y="137" font-size="6.8" fill="var(--text-muted)">(and how it is absorbed)</text>
<text x="401" y="158" font-size="7" fill="var(--text-secondary)">sets a maximum safe placement height -></text>
<text x="401" y="169" font-size="7" fill="var(--text-secondary)">the mission LOWERS fruit, never drops it.</text>
<text x="401" y="190" font-size="7.4" fill="var(--danger-text)" font-weight="700">threshold: bruise energy E_br</text>
<text x="20" y="228" font-size="7.8" fill="var(--text-muted)">Bruising is mechanical damage: cells rupture when local stress exceeds their failure limit, causing internal softening that may appear only days</text>
<text x="20" y="240" font-size="7.8" fill="var(--text-muted)">after harvest. Both modes become design bounds, the grip-force window (Section 7.4) and the placement-height limit (Section 7.4). Section 6.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M9-7</span><span class="sec">Section 7</span><span class="ttl">Compliance absorbs placement error and latency</span></figcaption><div class="body"><svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Compliance absorbs placement error and latency: a rigid gripper meeting a misaligned or late grasp spikes the contact force out of the window and bruises, while a compliant gripper yields to the misalignment and to latency-induced force error, keeping the force inside the window; the same compliance that limits control bandwidth makes imperfect control gentle." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Compliance absorbs placement error and latency (EI-09)</text>
<text x="140" y="72" font-size="8.6" fill="var(--text-primary)" font-weight="700" text-anchor="middle">RIGID gripper</text>
<rect x="70" y="122" width="140" height="40" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)"/>
<line x1="64" y1="162" x2="216" y2="162" stroke="var(--info)" stroke-width="1.2"/>
<text x="220" y="165.2" font-size="6.2" fill="var(--info)">F_slip</text>
<line x1="64" y1="122" x2="216" y2="122" stroke="var(--danger)" stroke-width="1.2"/>
<text x="220" y="125.24000000000001" font-size="6.2" fill="var(--danger-text)">F_bruise</text>
<text x="140" y="142.76" font-size="6.2" fill="var(--accent)" text-anchor="middle">window</text>
<path d="M 80,146 L 120,146 L 140,92 L 160,146 L 200,146" fill="none" stroke="var(--danger)" stroke-width="2"/>
<text x="140" y="88.0" font-size="6.6" fill="var(--danger-text)" text-anchor="middle">force spikes out of window -> bruise</text>
<text x="500" y="72" font-size="8.6" fill="var(--text-primary)" font-weight="700" text-anchor="middle">COMPLIANT gripper</text>
<rect x="430" y="122" width="140" height="40" fill="var(--accent)" fill-opacity="0.14" stroke="var(--accent)"/>
<line x1="424" y1="162" x2="576" y2="162" stroke="var(--info)" stroke-width="1.2"/>
<text x="580" y="165.2" font-size="6.2" fill="var(--info)">F_slip</text>
<line x1="424" y1="122" x2="576" y2="122" stroke="var(--danger)" stroke-width="1.2"/>
<text x="580" y="125.24000000000001" font-size="6.2" fill="var(--danger-text)">F_bruise</text>
<text x="500" y="142.76" font-size="6.2" fill="var(--accent)" text-anchor="middle">window</text>
<path d="M 440,146 L 480,146 Q 500,129 520,146 L 560,146" fill="none" stroke="var(--accent)" stroke-width="2"/>
<text x="500" y="118.24000000000001" font-size="6.6" fill="var(--accent)" text-anchor="middle">compliance absorbs it -> stays in window</text>
<text x="20" y="224" font-size="7.8" fill="var(--text-muted)">A misaligned grasp (placement error) or a late force command (latency) drives a rigid contact out of the window. Passive compliance yields,</text>
<text x="20" y="236" font-size="7.8" fill="var(--text-muted)">absorbing the error so the force stays inside [F_slip, F_bruise]. The same compliance that limits bandwidth makes imperfect control gentle (EI-09). Sections 6.4 and 7.4.</text>
<text x="20" y="250" font-size="7.4" fill="var(--text-muted)">Illustrative traces.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M5-3</span><span class="sec">Section 7</span><span class="ttl">Covariance propagation through the transform chain</span></figcaption><div class="body"><svg viewBox="0 0 760 255" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Covariance propagation: at each stage the output covariance is the Jacobian times the input covariance times the Jacobian transpose, so chaining stages composes the Jacobians and the per-source noise accumulates into the fruit-pose covariance in the robot frame that the occlusion gate and the grasp module consume." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Covariance propagation through the transform chain</text>
<ellipse cx="120" cy="120" rx="34" ry="20" fill="var(--info)" fill-opacity="0.18" stroke="var(--info)" stroke-width="1.4"/>
<circle cx="120" cy="120" r="2.5" fill="var(--info)"/>
<text x="120" y="168" font-size="7.2" fill="var(--info)" text-anchor="middle">&#931;_x (input)</text>
<text x="120" y="180" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">per-source noise</text>
<rect x="230" y="98" width="120" height="44" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="290" y="116" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">transform</text>
<text x="290" y="130" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">y = f(x),  J = df/dx</text>
<line x1="164" y1="120" x2="228" y2="120" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="350" y1="120" x2="414" y2="120" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<ellipse cx="470" cy="120" rx="42" ry="30" fill="var(--accent-2)" fill-opacity="0.18" stroke="var(--accent-2)" stroke-width="1.4" transform="rotate(28 470 120)"/>
<circle cx="470" cy="120" r="2.5" fill="var(--accent-2)"/>
<text x="470" y="172" font-size="7.2" fill="var(--accent-2)" text-anchor="middle">&#931;_y (rotated, scaled)</text>
<rect x="540" y="86" width="200" height="72" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="554" y="108" font-size="9.5" fill="var(--accent)" font-weight="700">&#931;_y = J &#931;_x J^T</text>
<text x="554" y="126" font-size="7" fill="var(--text-muted)">chaining stages composes</text>
<text x="554" y="137" font-size="7" fill="var(--text-muted)">the Jacobians</text>
<text x="554" y="150" font-size="6.6" fill="var(--text-secondary)">first-order propagation</text>
<text x="20" y="208" font-size="7.8" fill="var(--text-muted)">Each input carries noise (depth sigma_Z growing as Z^2, calibration/hand-eye residual, rover-pose uncertainty). The deliverable of localization</text>
<text x="20" y="220" font-size="7.8" fill="var(--text-muted)">is not a point but a pose WITH covariance, the honest statement of where the fruit is and how sure we are. Downstream (M7/M9) must use it.</text>
<text x="20" y="234" font-size="7.8" fill="var(--text-muted)">The accumulated covariance feeds the occlusion gate and the grasp module. Sections 6.4 and 7.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M6-7</span><span class="sec">Section 6</span><span class="ttl">Software- to hardware-in-the-loop (SIL -&gt; HIL)</span></figcaption><div class="body"><svg viewBox="0 0 760 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The hardware-in-the-loop rig: the digital twin generates sensor streams and scenes that drive the real edge device running the deployed stack, measuring true latency, power, and thermal behavior against the budgets, the last validation before field hardware and the honest test that catches worked-on-my-laptop." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Software- to hardware-in-the-loop (SIL -> HIL)</text>
<rect x="30" y="70" width="180" height="90" rx="10" fill="var(--surface)" stroke="var(--info)" stroke-width="1.6"/>
<text x="120" y="92" font-size="9" fill="var(--info)" font-weight="700" text-anchor="middle">DIGITAL TWIN (sim)</text>
<text x="120" y="110" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">generates sensor streams</text>
<text x="120" y="122" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">+ scenes (M3 virtual sensors)</text>
<text x="120" y="142" font-size="6.6" fill="var(--accent)" text-anchor="middle">rendered / played-back data</text>
<line x1="210" y1="115" x2="270" y2="115" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#a)"/>
<text x="240" y="108" font-size="6.4" fill="var(--text-muted)">feeds</text>
<rect x="272" y="70" width="200" height="90" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.8"/>
<text x="372" y="92" font-size="9" fill="var(--accent)" font-weight="700" text-anchor="middle">REAL EDGE DEVICE</text>
<text x="372" y="108" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">Jetson-class, the DEPLOYED stack</text>
<text x="372" y="124" font-size="6.8" fill="var(--text-secondary)" text-anchor="middle">perceive -> decide -> act</text>
<text x="372" y="144" font-size="6.6" fill="var(--warn-text)" text-anchor="middle">hot, loaded, real hardware</text>
<rect x="534" y="70" width="200" height="90" rx="10" fill="var(--surface-2)" stroke="var(--warn)" stroke-width="1.5"/>
<text x="634" y="92" font-size="8.4" fill="var(--warn-text)" font-weight="700" text-anchor="middle">MEASURE vs budgets</text>
<text x="634" y="110" font-size="7" fill="var(--text-secondary)" text-anchor="middle">true latency (CEC-01)</text>
<text x="634" y="122" font-size="7" fill="var(--text-secondary)" text-anchor="middle">power + thermal (M12)</text>
<text x="634" y="142" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">datasheet != delivered (EI-06)</text>
<line x1="472" y1="115" x2="532" y2="115" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#a)"/>
<text x="20" y="192" font-size="7.8" fill="var(--text-secondary)" font-weight="700">The last validation before field hardware, and the honest test that catches "worked on my laptop."</text>
<text x="20" y="206" font-size="7.8" fill="var(--text-muted)">SIL (stack against pure sim) advances to HIL (real edge/actuators driven by the sim). Prove it in hardware-in-the-loop before the field. Section 6.8.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M7-7</span><span class="sec">Section 7</span><span class="ttl">Value-based pick sequencing</span></figcaption><div class="body"><svg viewBox="0 0 760 255" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Value-based pick sequencing assigns each admitted fruit a value equal to a ripeness-and-confidence weighted term over its cycle cost, then sequences by descending value subject to reachability and the cycle-time budget, an uncertainty- and value-aware ordering bounded in decision time." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Value-based pick sequencing</text>
<rect x="470" y="52" width="272" height="60" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="484" y="74" font-size="10" fill="var(--accent)" font-weight="700">V_i = w_r r_i (1 - u_i) / c_i</text>
<text x="484" y="90" font-size="6.6" fill="var(--text-muted)">r_i ripeness, u_i uncertainty (covariance, CEC-03),</text>
<text x="484" y="101" font-size="6.6" fill="var(--text-muted)">c_i cycle cost, w_r weight</text>
<text x="30" y="66" font-size="8" fill="var(--text-secondary)" font-weight="700">admitted fruit -> sequence by descending V_i:</text>
<rect x="30" y="80" width="308" height="24" rx="4" fill="var(--accent-2)" fill-opacity="0.5" stroke="var(--accent-2)"/>
<text x="38" y="96" font-size="7.4" fill="var(--text-on-accent)" font-weight="700">1. fruit A</text>
<text x="345.8" y="96" font-size="6.8" fill="var(--accent-2)">V=0.81  (r=0.9, u=0.1, c=1.0)</text>
<rect x="30" y="114" width="243" height="24" rx="4" fill="var(--accent-2)" fill-opacity="0.5" stroke="var(--accent-2)"/>
<text x="38" y="130" font-size="7.4" fill="var(--text-on-accent)" font-weight="700">2. fruit C</text>
<text x="281.20000000000005" y="130" font-size="6.8" fill="var(--accent-2)">V=0.64  (r=0.95, u=0.05, c=1.4)</text>
<rect x="30" y="148" width="201" height="24" rx="4" fill="var(--accent-2)" fill-opacity="0.5" stroke="var(--accent-2)"/>
<text x="38" y="164" font-size="7.4" fill="var(--text-on-accent)" font-weight="700">3. fruit B</text>
<text x="239.4" y="164" font-size="6.8" fill="var(--accent-2)">V=0.53  (r=0.7, u=0.4, c=0.8)</text>
<rect x="30" y="182" width="201" height="24" rx="4" fill="var(--accent-2)" fill-opacity="0.5" stroke="var(--accent-2)"/>
<text x="38" y="198" font-size="7.4" fill="var(--text-on-accent)" font-weight="700">4. fruit D</text>

<text x="20" y="232" font-size="7.8" fill="var(--text-muted)">Sequence by descending V_i subject to reachability and the cycle-time budget (CEC-01): riper, more certain, cheaper-to-reach fruit go first.</text>
<text x="20" y="244" font-size="7.8" fill="var(--text-muted)">Uncertainty- and value-aware ordering, bounded in decision time. Illustrative values. Section 7.1.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M9-2</span><span class="sec">Section 7</span><span class="ttl">Pressure to force (F = P A) on the window</span></figcaption><div class="body"><svg viewBox="0 0 760 255" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pressure to force: grip force is gauge pressure times piston area, a straight line whose slope is the area; sizing the actuator area sets how the commandable pressure range maps onto the grip-force window between slip and bruise, so the actuator must be able to reach every force in the window and no more than necessary." font-family="'IBM Plex Mono',monospace">
