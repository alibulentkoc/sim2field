<line x1="457" y1="281" x2="448" y2="294" stroke="var(--border)" stroke-width="1"/>
<line x1="475" y1="288" x2="466" y2="301" stroke="var(--border)" stroke-width="1"/>
<line x1="494" y1="294" x2="485" y2="307" stroke="var(--border)" stroke-width="1"/>
<line x1="287" y1="219" x2="407" y2="219" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 3"/>
