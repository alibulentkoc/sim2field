<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M8-4 preview - Jacobian transmission</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--info:#6fb0d9;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4;--accent-2:#b98bd9}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem}
.figure{max-width:840px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto} .figbody svg{display:block;width:100%;height:auto;min-width:620px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)} .fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}</style></head>
<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Jacobian as velocity and force transmission: velocity maps joint to task space and force maps task to joint by the transpose; the manipulability ellipse is round in a well-conditioned pose and flattens near a singularity, where velocity collapses in one direction and force blows up." font-family="'IBM Plex Mono',monospace">
<defs><marker id="j" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<rect x="70" y="44" width="150" height="52" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="145" y="66" text-anchor="middle" font-size="9.5" fill="var(--text-primary)" font-weight="700">joint space</text>
<text x="145" y="82" text-anchor="middle" font-size="8" fill="var(--text-muted)">q_dot ,  tau</text>
<rect x="540" y="44" width="150" height="52" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="615" y="66" text-anchor="middle" font-size="9.5" fill="var(--text-primary)" font-weight="700">task space</text>
<text x="615" y="82" text-anchor="middle" font-size="8" fill="var(--text-muted)">x_dot ,  F</text>
<line x1="222" y1="62" x2="538" y2="62" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#j)"/>
<text x="380" y="56" text-anchor="middle" font-size="9" fill="var(--accent)" font-weight="700">velocity:  x_dot = J q_dot</text>
<line x1="538" y1="84" x2="222" y2="84" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#j)"/>
<text x="380" y="97" text-anchor="middle" font-size="9" fill="var(--warn-text)" font-weight="700">force (dual):  tau = J^T F</text>
<text x="380" y="120" text-anchor="middle" font-size="7.8" fill="var(--text-muted)">J = d x / d q, the local linearization of the kinematics; for the parallel mechanism J is built from the actuator direction unit vectors.</text>
<text x="380" y="152" text-anchor="middle" font-size="9" fill="var(--text-primary)" font-weight="700">Manipulability ellipse: J maps the unit joint-velocity circle to a velocity ellipse in task space</text>
<circle cx="206" cy="250" r="34" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="206" y="210" text-anchor="middle" font-size="7" fill="var(--text-muted)">unit q_dot circle</text>
<ellipse cx="206" cy="250" rx="66" ry="50" transform="rotate(-24 206 250)" fill="var(--accent)" fill-opacity="0.15" stroke="var(--accent)" stroke-width="2"/>
<line x1="206" y1="250" x2="266" y2="223" stroke="var(--accent)" stroke-width="1.3"/>
<line x1="206" y1="250" x2="146" y2="277" stroke="var(--accent)" stroke-width="1.3"/>
<text x="206" y="315" text-anchor="middle" font-size="9.5" fill="var(--accent)" font-weight="700">well-conditioned</text>
<text x="206" y="330" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">motion transmits evenly; force likewise</text>
<circle cx="556" cy="250" r="34" fill="none" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="556" y="210" text-anchor="middle" font-size="7" fill="var(--text-muted)">unit q_dot circle</text>
<ellipse cx="556" cy="250" rx="96" ry="14" transform="rotate(-24 556 250)" fill="var(--danger)" fill-opacity="0.15" stroke="var(--danger)" stroke-width="2"/>
<line x1="556" y1="250" x2="644" y2="211" stroke="var(--danger)" stroke-width="1.3"/>
<line x1="556" y1="250" x2="468" y2="289" stroke="var(--danger)" stroke-width="1.3"/>
<text x="556" y="315" text-anchor="middle" font-size="9.5" fill="var(--danger)" font-weight="700">near singular</text>
<line x1="556" y1="250" x2="563" y2="265" stroke="var(--danger)" stroke-width="1.4" stroke-dasharray="2 2"/>
<text x="556" y="330" text-anchor="middle" font-size="7.6" fill="var(--danger-text)">velocity collapses along one axis (lost DOF);</text>
<text x="556" y="341" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">force there blows up (J^T reciprocal). det J -&gt; 0.</text>
</svg></div><figcaption><span class="fid">F-M8-4</span>The Jacobian as velocity and force transmission. Velocity maps joint to task; force maps task to joint by the transpose. The manipulability ellipse is round in a well-conditioned pose and flattens near a singularity, where velocity collapses along one axis and force blows up. Companion to the two-circle FK figure. Module 8, Sections 6.4 and 7.3.</figcaption></figure></body></html>
