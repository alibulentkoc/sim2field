<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M12-5 preview - Power distribution</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--text-on-accent:#0e120d;--accent:#9bcf3b;--accent-strong:#6f9a2c;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4}

.figure{max-width:880px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto} .figbody svg{display:block;width:100%;height:auto;min-width:680px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)} .fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}</style></head>

<text x="398" y="293" text-anchor="middle" font-size="9" fill="var(--text-on-accent)" font-weight="700">3</text>

<path d="M646,194 L646,214 L646,240" fill="none" stroke="var(--accent)" stroke-width="1.6" marker-end="url(#en)"/>
<text x="652" y="230" font-size="7.5" fill="var(--accent)">enable only after M11 OK</text>
<text x="16" y="256" font-size="8.5" fill="var(--text-primary)" font-weight="700">Power sequencing</text>
<text x="16" y="270" font-size="7.8" fill="var(--text-muted)">(1) safety monitor + logic</text>
<text x="16" y="282" font-size="7.8" fill="var(--text-muted)">(2) compute + sensors</text>
<text x="16" y="294" font-size="7.8" fill="var(--text-muted)">(3) actuators enabled last</text>
<text x="16" y="364" font-size="8.5" fill="var(--text-secondary)">Clean compute/sensor rails are separated from noisy actuation/drive rails; protection guards the bus, and sequencing brings the safety monitor up first. This is the electrical realization of the M11 integration.</text>
</svg></div><figcaption><span class="fid">F-M12-5</span>Power distribution architecture. The battery feeds a protected main bus that splits into clean regulated rails (compute, sensors, logic, safety monitor) isolated from noisy high-current rails (actuation, drive). Protection guards the bus, and sequencing brings the safety monitor up first, enabling actuators last. Module 12, Section 6.6.</figcaption></figure></body></html>
