<svg viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The signal-to-action spine: a camera frame enters Perceive, which hands a 3-D target to Decide, which hands a grasp command to Act, which delivers a grasped fruit; all three are bound by an Integrate-to-Deploy layer." font-family="'IBM Plex Mono',monospace">
<defs><marker id="ah1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="6" y="18" font-size="9.5" fill="var(--text-muted)">One machine that turns a camera frame into a grasped fruit</text>
<rect x="6" y="74.0" width="74" height="36" rx="8" fill="var(--surface-2)" stroke="var(--accent-dim)"/>
<text x="43" y="91.0" text-anchor="middle" font-size="9" fill="var(--accent-dim)">camera</text>
<text x="43" y="103.0" text-anchor="middle" font-size="9" fill="var(--accent-dim)">frame</text>
<rect x="104" y="42" width="132" height="100" rx="11" fill="var(--surface)" stroke="var(--border)" stroke-width="1.4"/>
<text x="170.0" y="76" text-anchor="middle" font-size="17" fill="var(--accent)" font-weight="700" font-family="'Space Grotesk',sans-serif">PERCEIVE</text>
<text x="170.0" y="104" text-anchor="middle" font-size="10" fill="var(--text-secondary)">detect &amp; localize</text>
<text x="170.0" y="120" text-anchor="middle" font-size="10" fill="var(--text-secondary)">the fruit</text>
<rect x="302" y="42" width="132" height="100" rx="11" fill="var(--surface)" stroke="var(--border)" stroke-width="1.4"/>
<text x="368.0" y="76" text-anchor="middle" font-size="17" fill="var(--accent)" font-weight="700" font-family="'Space Grotesk',sans-serif">DECIDE</text>
<text x="368.0" y="104" text-anchor="middle" font-size="10" fill="var(--text-secondary)">plan the pick</text>
<text x="368.0" y="120" text-anchor="middle" font-size="10" fill="var(--text-secondary)">&amp; the grasp</text>
<rect x="500" y="42" width="132" height="100" rx="11" fill="var(--surface)" stroke="var(--border)" stroke-width="1.4"/>
<text x="566.0" y="76" text-anchor="middle" font-size="17" fill="var(--accent)" font-weight="700" font-family="'Space Grotesk',sans-serif">ACT</text>
<text x="566.0" y="104" text-anchor="middle" font-size="10" fill="var(--text-secondary)">position, grasp, lift,</text>
<text x="566.0" y="120" text-anchor="middle" font-size="10" fill="var(--text-secondary)">transfer, release</text>
<line x1="80" y1="92.0" x2="101" y2="92.0" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#ah1)"/>
<line x1="236" y1="92.0" x2="299" y2="92.0" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#ah1)"/>
<text x="269.0" y="82.0" text-anchor="middle" font-size="8.5" fill="var(--text-muted)" font-style="italic">3-D target</text>
<line x1="434" y1="92.0" x2="497" y2="92.0" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#ah1)"/>
<text x="467.0" y="82.0" text-anchor="middle" font-size="8.5" fill="var(--text-muted)" font-style="italic">grasp command</text>
<line x1="632" y1="92.0" x2="653" y2="92.0" stroke="var(--border-strong)" stroke-width="1.6" marker-end="url(#ah1)"/>
<text x="644.0" y="82.0" text-anchor="middle" font-size="8.5" fill="var(--text-muted)" font-style="italic">placed fruit</text>
<rect x="656" y="74.0" width="96" height="36" rx="8" fill="var(--surface-2)" stroke="var(--accent)"/>
<text x="704" y="91.0" text-anchor="middle" font-size="9" fill="var(--accent)" font-weight="700">grasped</text>
<text x="704" y="103.0" text-anchor="middle" font-size="9" fill="var(--accent)" font-weight="700">fruit</text>
<line x1="170.0" y1="142" x2="170.0" y2="206" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="368.0" y1="142" x2="368.0" y2="206" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="566.0" y1="142" x2="566.0" y2="206" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 3"/>
<rect x="104" y="206" width="528" height="60" rx="11" fill="var(--surface-2)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="368.0" y="232" text-anchor="middle" font-size="14" fill="var(--accent-2)" font-weight="700" font-family="'Space Grotesk',sans-serif">INTEGRATE -&gt; DEPLOY</text>
<text x="368.0" y="252" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">power, compute, safety, real-time comms  |  the machine as one system</text>
<text x="104" y="286" font-size="9" fill="var(--text-muted)">Every module of the course advances exactly one stage of this spine (CEC-01).</text>
</svg>