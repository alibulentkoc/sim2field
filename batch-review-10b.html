<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>Batch review B: 10 new figures</title><style>
:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--text-on-accent:#0e120d;--accent:#9bcf3b;--accent-strong:#6f9a2c;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4;--accent-2:#b98bd9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem 2.2rem 4rem}
h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:1.4rem;margin:0 0 .3rem}
.lead{color:var(--text-muted);font-size:.82rem;max-width:80ch;line-height:1.5;margin:.2rem 0 1.4rem}
.grid{display:grid;grid-template-columns:1fr;gap:1.1rem;max-width:900px}
.card{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface)}
figcaption{padding:.55rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.fid{font-size:.62rem;font-weight:700;color:var(--accent);border:1px solid var(--accent-strong);border-radius:5px;padding:.05rem .4rem}
.sec{font-size:.6rem;color:var(--text-muted);border:1px solid var(--border-strong);border-radius:5px;padding:.05rem .4rem}
.ttl{font-size:.8rem;color:var(--text-secondary)}
.body{padding:.8rem;background:var(--surface-3);overflow-x:auto}.body svg{display:block;width:100%;height:auto;min-width:660px}
</style></head><body>
<h1>Batch review B: 10 new figures</h1>
<p class="lead">Ten more buildable-backlog figures across Modules 2, 4, 5, 7, 8, 9, 10, 11, 12, and 14. Each is bound to its module, rendered in both editions, and passes the drift and typography guards. Illustrative values are labeled on each figure.</p>
<div class="grid"><figure class="card"><figcaption><span class="fid">F-M8-1</span><span class="sec">Section 6</span><span class="ttl">The rail-mounted parallel manipulator (geometry)</span></figcaption><div class="body"><svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The rail-mounted parallel manipulator positions the gripper point G with two cylinders anchored at B1 and B2 on the rail, each of length equal to the distance from G to its anchor; inverse kinematics is the direct distance computation and forward kinematics is the two-circle intersection." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The rail-mounted parallel manipulator</text>
<line x1="120" y1="190" x2="640" y2="190" stroke="var(--border-strong)" stroke-width="3"/>
<text x="120" y="206" font-size="7.4" fill="var(--text-muted)">rail (rover track width sets B1-B2 separation)</text>
<line x1="210" y1="190" x2="360" y2="86" stroke="var(--info)" stroke-width="2"/>
<circle cx="210" cy="190" r="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="210" y="220" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">B1</text>
<line x1="470" y1="190" x2="360" y2="86" stroke="var(--info)" stroke-width="2"/>
<circle cx="470" cy="190" r="6" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="470" y="220" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">B2</text>
<text x="269.0" y="138.0" font-size="8" fill="var(--info)" font-weight="700">L1</text>
<text x="423.0" y="138.0" font-size="8" fill="var(--info)" font-weight="700">L2</text>
<circle cx="360" cy="86" r="7" fill="var(--accent-2)"/>
<text x="370" y="88" font-size="9" fill="var(--accent-2)" font-weight="700">G (gripper point)</text>
<rect x="470" y="60" width="272" height="86" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="484" y="80" font-size="8.4" fill="var(--text-secondary)">Inverse kinematics (direct):</text>
<text x="484" y="96" font-size="9" fill="var(--accent)" font-weight="700">L_i = || G - B_i ||</text>
<text x="484" y="114" font-size="7.6" fill="var(--text-secondary)">Forward kinematics: intersection of</text>
<text x="484" y="125" font-size="7.6" fill="var(--text-secondary)">two circles (two solutions; branch</text>
<text x="484" y="136" font-size="7.6" fill="var(--text-secondary)">fixed by the assembly).</text>
<text x="20" y="240" font-size="7.8" fill="var(--text-muted)">Parallel arrangement is stiff and light: actuators carry load in tension/compression, not bending, which matters for precision and for the</text>
<text x="20" y="252" font-size="7.8" fill="var(--text-muted)">5 to 10 kg payload. The base-anchor separation is bounded by the rover track width (the coupling TS-1 flagged). Section 6.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M9-4</span><span class="sec">Section 6</span><span class="ttl">Closed-loop grasp-force control</span></figcaption><div class="body"><svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Closed-loop grasp-force control: a controller compares measured force to the target from the policy and drives a proportional valve to hold it; direct control regulates force to a setpoint while impedance control regulates the force-displacement relationship so the gripper behaves like a controllable spring-damper, and the loop bandwidth is kept conservative because delay plus fluid compliance invites oscillation." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Closed-loop grasp-force control</text>
<rect x="30" y="70" width="120" height="40" rx="7" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="90.0" y="88.0" font-size="8" fill="var(--accent-2)" font-weight="700" text-anchor="middle">F_target</text>
<text x="90.0" y="100.0" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">from policy (M7)</text>
<rect x="196" y="70" width="120" height="40" rx="7" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="256.0" y="88.0" font-size="8" fill="var(--info)" font-weight="700" text-anchor="middle">controller</text>
<text x="256.0" y="100.0" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">proportional valve</text>
<rect x="362" y="70" width="120" height="40" rx="7" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="422.0" y="88.0" font-size="8" fill="var(--accent)" font-weight="700" text-anchor="middle">actuator</text>
<text x="422.0" y="100.0" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">gripper + fluid</text>
<rect x="528" y="70" width="120" height="40" rx="7" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.4"/>
<text x="588.0" y="88.0" font-size="8" fill="var(--warn)" font-weight="700" text-anchor="middle">fruit contact</text>
<text x="588.0" y="100.0" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">force F</text>
<line x1="150" y1="90" x2="194" y2="90" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="316" y1="90" x2="360" y2="90" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="482" y1="90" x2="526" y2="90" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<path d="M 588,110 L 588,150 L 256,150 L 256,112" fill="none" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<text x="420" y="146" font-size="7" fill="var(--text-muted)">measured pressure / force (M3)</text>
<text x="196" y="128" font-size="6.6" fill="var(--danger-text)">- error</text>
<rect x="30" y="172" width="350" height="70" rx="8" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.6"/>
<text x="44" y="190" font-size="8" fill="var(--info)" font-weight="700">Direct force control</text>
<text x="44" y="204" font-size="7" fill="var(--text-muted)">regulate F to a setpoint (PID on pressure);</text>
<text x="44" y="215" font-size="7" fill="var(--text-muted)">simple, but stiff response to disturbances.</text>
<text x="44" y="232" font-size="7" fill="var(--text-secondary)">cmd &#8733; K_p (F_target - F_meas) + ...</text>
<rect x="392" y="172" width="350" height="70" rx="8" fill="var(--surface-2)" stroke="var(--accent-2)" stroke-opacity="0.6"/>
<text x="406" y="190" font-size="8" fill="var(--accent-2)" font-weight="700">Impedance / compliance control</text>
<text x="406" y="204" font-size="7" fill="var(--text-muted)">render a spring-damper against the fruit:</text>
<text x="406" y="220" font-size="7.4" fill="var(--text-secondary)">F = K_d(x_d - x) + B_d(x_d' - x')</text>
<text x="406" y="234" font-size="6.6" fill="var(--text-muted)">control HOW it interacts, not just how hard.</text>
<text x="20" y="268" font-size="7.6" fill="var(--text-muted)">Delay (edge control latency, CEC-04/M6) plus fluid compliance is a recipe for oscillation, so bandwidth is chosen conservatively:</text>
<text x="20" y="280" font-size="7.6" fill="var(--text-muted)">keep crossover &#969;_c &lt;~ 1/(k &#964;_d). The same compliance that limits bandwidth makes imperfect control gentle (EI-09). Sections 6.4 and 7.3.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M4-2</span><span class="sec">Section 6</span><span class="ttl">Multi-head detection architecture</span></figcaption><div class="body"><svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A shared convolutional backbone feeds three task-specific heads: detection locates each fruit, instance segmentation gives the per-fruit mask the grasp needs to size and place contact, and ripeness classification labels each instance from RGB and near-infrared cues; the backbone family (single-stage, two-stage, or transformer) is traded against the cycle-time budget and the edge device." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Multi-head detection architecture</text>
<rect x="30" y="72" width="150" height="120" rx="9" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="105" y="96" font-size="9" fill="var(--accent)" font-weight="700" text-anchor="middle">BACKBONE</text>
<text x="105" y="112" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">shared conv features</text>
<text x="105" y="124" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">edges -> fruit-like</text>
<text x="105" y="144" font-size="6.4" fill="var(--text-muted)" font-weight="anc=middle">weight sharing,</text>
<text x="105" y="155" font-size="6.4" fill="var(--text-muted)" font-weight="anc=middle">translation-tolerant</text>
<text x="105" y="176" font-size="6.4" fill="var(--text-muted)" font-weight="anc=middle">(pretrained, M4 6.4)</text>
<rect x="300" y="72" width="290" height="34" rx="7" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="312" y="87" font-size="8" fill="var(--info)" font-weight="700">detection</text>
<text x="312" y="99" font-size="6.4" fill="var(--text-muted)">bbox + confidence  -  is it there, and where</text>
<line x1="180" y1="132" x2="298" y2="89" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="300" y="114" width="290" height="34" rx="7" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.3"/>
<text x="312" y="129" font-size="8" fill="var(--accent-2)" font-weight="700">instance segmentation</text>
<text x="312" y="141" font-size="6.4" fill="var(--text-muted)">per-fruit mask  -  extent/shape for grasp (CEC-02)</text>
<line x1="180" y1="132" x2="298" y2="131" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="300" y="156" width="290" height="34" rx="7" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.3"/>
<text x="312" y="171" font-size="8" fill="var(--warn)" font-weight="700">ripeness classification</text>
<text x="312" y="183" font-size="6.4" fill="var(--text-muted)">per-instance label  -  from RGB + NIR cues (M2/M3)</text>
<line x1="180" y1="132" x2="298" y2="173" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<text x="300" y="66" font-size="7" fill="var(--text-muted)">heads read the shared feature maps:</text>
<rect x="608" y="72" width="134" height="120" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="618" y="90" font-size="7.4" fill="var(--text-primary)" font-weight="700">Backbone family:</text>
<text x="618" y="106" font-size="6.8" fill="var(--text-secondary)">single-stage</text>
<text x="618" y="115" font-size="6.2" fill="var(--text-muted)">fast, edge (YOLO)</text>
<text x="618" y="130" font-size="6.8" fill="var(--text-secondary)">two-stage</text>
<text x="618" y="139" font-size="6.2" fill="var(--text-muted)">accurate, slower</text>
<text x="618" y="154" font-size="6.8" fill="var(--text-secondary)">transformer</text>
<text x="618" y="163" font-size="6.2" fill="var(--text-muted)">flexible, data/</text>
<text x="618" y="182" font-size="6.2" fill="var(--text-muted)">compute-hungry</text>
<text x="20" y="236" font-size="7.8" fill="var(--text-muted)">The architecture choice is a trade against the cycle-time budget (CEC-01) and the edge device (M6): single-stage predicts all outputs in one</text>
<text x="20" y="248" font-size="7.8" fill="var(--text-muted)">pass (real-time); two-stage propose-then-refine is more accurate but slower; transformers are flexible but data- and compute-hungry. Section 6.3.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M5-1</span><span class="sec">Section 6</span><span class="ttl">From pixel to 3-D: back-projection</span></figcaption><div class="body"><svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Back-projection: with a calibrated camera and a known depth, a pixel is mapped to a 3-D point in the camera frame by scaling the inverse-intrinsics ray by the depth; the mask centroid from detection plus the stereo depth gives the fruit's camera-frame position, the start of the frame chain." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">From pixel to 3-D: back-projection</text>
<rect x="90" y="86" width="120" height="120" rx="4" fill="#1f3a1a" stroke="var(--border-strong)"/>
<text x="150" y="78" font-size="7.4" fill="var(--info)" text-anchor="middle">image (u,v)</text>
<circle cx="168" cy="120" r="6" fill="var(--accent-2)" fill-opacity="0.6" stroke="var(--accent-2)"/>
<line x1="150" y1="120" x2="186" y2="120" stroke="var(--info)" stroke-width="0.6"/><line x1="168" y1="102" x2="168" y2="138" stroke="var(--info)" stroke-width="0.6"/>
<text x="168" y="150" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">mask centroid (M4)</text>
<circle cx="260" cy="146" r="4" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.4"/>
<text x="260" y="162" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">camera</text>
<line x1="168" y1="120" x2="560" y2="96" stroke="var(--info)" stroke-width="1.6" marker-end="url(#a)"/>
<circle cx="560" cy="96" r="7" fill="var(--accent-2)"/>
<text x="570" y="98" font-size="8.5" fill="var(--accent-2)" font-weight="700">P_c (fruit, camera frame)</text>
<line x1="260" y1="222" x2="560" y2="222" stroke="var(--text-secondary)" stroke-width="0.8"/>
<line x1="260" y1="218" x2="260" y2="226" stroke="var(--text-secondary)"/><line x1="560" y1="218" x2="560" y2="226" stroke="var(--text-secondary)"/>
<text x="410.0" y="234" font-size="7.4" fill="var(--accent)" text-anchor="middle">depth Z (stereo, M3)</text>
<rect x="470" y="126" width="272" height="74" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="484" y="146" font-size="8.6" fill="var(--accent)" font-weight="700">P_c = Z K^-1 [u v 1]^T</text>
<text x="484" y="164" font-size="7" fill="var(--text-muted)">K = intrinsics (from M3 calibration)</text>
<text x="484" y="178" font-size="7" fill="var(--text-muted)">known depth Z inverts the projection</text>
<text x="484" y="192" font-size="7" fill="var(--text-secondary)">mask centroid + stereo depth -> P_c</text>
<text x="20" y="252" font-size="7.8" fill="var(--text-muted)">Everything downstream (the frame chain) is moving this camera-frame point into the frame where the robot acts. Section 6.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M11-2</span><span class="sec">Section 6</span><span class="ttl">Control plane vs perception plane</span></figcaption><div class="body"><svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The architecture separates a real-time control plane (grasp-force loop, drive and stability, motion, safety monitor) that must meet deadlines with bounded worst-case latency from a best-effort perception plane (detection, localization) that wants throughput but tolerates jitter, isolated so a neural network occasionally taking longer cannot delay the force loop." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Control plane vs perception plane</text>
<rect x="30" y="60" width="340" height="150" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.7"/>
<text x="46" y="80" font-size="9.5" fill="var(--accent)" font-weight="700">CONTROL PLANE  (real-time)</text>
<text x="46" y="93" font-size="6.8" fill="var(--text-muted)">deadlines, bounded worst-case latency, isolated</text>
<rect x="46" y="104" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="117" font-size="7.4" fill="var(--text-secondary)">grasp-force loop (M9)</text>
<rect x="46" y="128" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="141" font-size="7.4" fill="var(--text-secondary)">drive / stability (M10)</text>
<rect x="46" y="152" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="165" font-size="7.4" fill="var(--text-secondary)">motion (M8)</text>
<rect x="46" y="176" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="189" font-size="7.4" fill="var(--text-secondary)">safety monitor (M11/M15)</text>
<text x="46" y="206" font-size="6.6" fill="var(--danger-text)">a rare late cycle is a real failure</text>
<rect x="410" y="60" width="320" height="150" rx="10" fill="var(--surface)" stroke="var(--info)" stroke-width="1.7"/>
<text x="426" y="80" font-size="9.5" fill="var(--info)" font-weight="700">PERCEPTION PLANE  (best-effort)</text>
<text x="426" y="93" font-size="6.8" fill="var(--text-muted)">high throughput, tolerates jitter</text>
<rect x="426" y="104" width="288" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="434" y="117" font-size="7.4" fill="var(--text-secondary)">detection (M4)</text>
<rect x="426" y="128" width="288" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="434" y="141" font-size="7.4" fill="var(--text-secondary)">localization / fusion (M5)</text>
<text x="426" y="170" font-size="6.8" fill="var(--text-muted)">a neural net occasionally taking longer</text>
<text x="426" y="181" font-size="6.8" fill="var(--text-muted)">must not delay the force loop</text>
<line x1="390" y1="66" x2="390" y2="204" stroke="var(--danger)" stroke-width="1.8" stroke-dasharray="5 3"/>
<text x="390" y="222" font-size="7" fill="var(--danger-text)" font-weight="anc=middle">isolation: jitter must not cross</text>
<text x="20" y="246" font-size="7.8" fill="var(--text-muted)">Required in M6 (DD-33); engineered here via executor/thread assignment, priorities, core affinity, and (where available) a real-time scheduler,</text>
<text x="20" y="258" font-size="7.8" fill="var(--text-muted)">so the control plane's worst case is bounded independent of perception load. Section 6.3.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M12-4</span><span class="sec">Section 6</span><span class="ttl">Thermal balance and the throttle point</span></figcaption><div class="body"><svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thermal balance across the field envelope: component temperature is ambient plus generated and solar heat times the thermal resistance; a cooling design validated on a cool clean bench can exceed the temperature limit at the field edge (hot ambient, solar load, dust-degraded airflow) and be forced to throttle the compute, a cycle-time risk." font-family="'IBM Plex Mono',monospace">
