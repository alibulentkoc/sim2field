<text x="20" y="240" font-size="7.8" fill="var(--text-secondary)" font-weight="700">Verify the whole design satisfies EVERY budget simultaneously, not one at a time: the composition M13 began, now complete and closed to the economics.</text>
<text x="20" y="254" font-size="7.8" fill="var(--text-muted)">The acceptance argument: works (CEC-01/02/03) / proven (M14) / safe (M15) / pencils out (M16), each on admissible evidence. Complements the M13 composed-</text>
