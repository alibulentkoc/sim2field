<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fluid-power grasp circuit: supply feeds a proportional valve driving a cylinder that closes the gripper on the fruit; a pressure sensor feeds a force controller that commands the valve, and a mechanical relief valve set at the bruise pressure caps force as a hard physical bound." font-family="'IBM Plex Mono',monospace">
<defs><marker id="f9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<rect x="18" y="94" width="112" height="48" rx="8" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.4"/>
<text x="74" y="114" text-anchor="middle" font-size="10" fill="var(--text-primary)" font-weight="700">SUPPLY</text>
<text x="74" y="128" text-anchor="middle" font-size="7.5" fill="var(--text-muted)">pump + accumulator</text>
<line x1="130" y1="118" x2="206" y2="118" stroke="var(--info)" stroke-width="2.4"/>
<line x1="176" y1="118" x2="176" y2="70" stroke="var(--info)" stroke-width="2.4"/>
<rect x="120" y="30" width="112" height="40" rx="7" fill="var(--surface)" stroke="var(--danger)" stroke-width="1.6"/>
<text x="176" y="47" text-anchor="middle" font-size="9.5" fill="var(--danger-text)" font-weight="700">RELIEF VALVE</text>
<text x="176" y="60" text-anchor="middle" font-size="7.5" fill="var(--text-muted)">set at P(F_bruise)</text>
<rect x="206" y="96" width="104" height="44" rx="7" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
<text x="258" y="114" text-anchor="middle" font-size="9.5" fill="var(--accent)" font-weight="700">PROPORTIONAL</text>
<text x="258" y="127" text-anchor="middle" font-size="9.5" fill="var(--accent)" font-weight="700">VALVE</text>
<line x1="310" y1="118" x2="378" y2="118" stroke="var(--info)" stroke-width="2.4"/>
<line x1="348" y1="118" x2="348" y2="86" stroke="var(--warn)" stroke-width="1.6"/>
<circle cx="348" cy="76" r="12" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.5"/>
<text x="348" y="80" text-anchor="middle" font-size="10" fill="var(--warn)" font-weight="700">P</text>
<text x="366" y="70" font-size="7.5" fill="var(--text-muted)">pressure sensor</text>
<rect x="378" y="98" width="86" height="40" rx="3" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.5"/>
<rect x="412" y="101" width="8" height="34" fill="var(--text-secondary)"/>
<line x1="420" y1="118" x2="498" y2="118" stroke="var(--text-secondary)" stroke-width="3"/>
<text x="421.0" y="92" text-anchor="middle" font-size="8" fill="var(--text-muted)">cylinder (area A)</text>
<rect x="498" y="92" width="12" height="20" rx="2" fill="var(--accent)"/>
<rect x="498" y="124" width="12" height="20" rx="2" fill="var(--accent)"/>
<circle cx="528" cy="118" r="17" fill="var(--accent-2)" fill-opacity="0.30" stroke="var(--accent-2)"/>
<text x="528" y="121" text-anchor="middle" font-size="7" fill="var(--accent-2)">fruit</text>
<text x="506" y="162" text-anchor="middle" font-size="8" fill="var(--text-muted)">gripper pads</text>
<rect x="214" y="232" width="300" height="58" rx="9" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="364.0" y="254" text-anchor="middle" font-size="10.5" fill="var(--accent)" font-weight="700">FORCE CONTROLLER</text>
<text x="364.0" y="270" text-anchor="middle" font-size="8" fill="var(--text-muted)">pressure feedback -&gt; valve command (impedance / force loop)</text>
<line x1="120" y1="261" x2="211" y2="261" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#f9)"/>
<text x="118" y="256" text-anchor="end" font-size="8" fill="var(--accent-2)">policy setpoint</text>
<text x="118" y="267" text-anchor="end" font-size="7.5" fill="var(--text-muted)">(M7 proposal)</text>
<line x1="348" y1="88" x2="348" y2="229" stroke="var(--warn)" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#f9)"/>
<line x1="258" y1="232" x2="258" y2="142" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#f9)"/>
<text x="264" y="226" font-size="7.5" fill="var(--text-muted)">command</text>
<text x="18" y="320" font-size="9" fill="var(--text-secondary)">F = P A: pressure sets force, flow sets speed. The fluid yields under load (intrinsic compliance).</text>
<text x="18" y="336" font-size="9" fill="var(--danger-text)" font-weight="700">The relief valve caps pressure at the bruise force: a hard physical bound (EI-09),</text>
<text x="18" y="349" font-size="8.5" fill="var(--text-muted)">the grasp's worst case is bounded by a valve, not by a proof about the neural policy. This is why opaque AI is safe to use here.</text>
</svg>