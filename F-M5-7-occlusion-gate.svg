<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The occlusion gate: each detection is localized to a pose with a covariance; if the estimated uncertainty exceeds a threshold (a heavily occluded fruit), the gate rejects it and defers or skips rather than handing the act stage a target it cannot trust." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The occlusion gate: uncertainty-driven decision</text>
<rect x="30" y="70" width="130" height="40" rx="7" fill="var(--surface)" stroke="var(--info)" stroke-width="1.3"/>
<text x="95" y="88" font-size="7.8" fill="var(--info)" font-weight="700" text-anchor="middle">detection (M4)</text>
<text x="95" y="101" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">mask + depth</text>
<rect x="200" y="70" width="140" height="40" rx="7" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.3"/>
<text x="270" y="88" font-size="7.8" fill="var(--accent-2)" font-weight="700" text-anchor="middle">estimate pose</text>
<text x="270" y="101" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">+ covariance (M5)</text>
<polygon points="400,90 445,66 490,90 445,114" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.4"/>
<text x="445" y="86" font-size="6.8" fill="var(--warn-text)" text-anchor="middle">uncertainty</text>
<text x="445" y="97" font-size="6.8" fill="var(--warn-text)" text-anchor="middle">&lt;= threshold?</text>
<line x1="160" y1="90" x2="198" y2="90" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<line x1="340" y1="90" x2="398" y2="90" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<rect x="560" y="56" width="170" height="34" rx="7" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="645" y="77" font-size="7.8" fill="var(--accent)" font-weight="700" text-anchor="middle">ACCEPT -> Act stage</text>
<line x1="490" y1="82" x2="558" y2="74" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="524" y="66" font-size="6.6" fill="var(--accent)" text-anchor="middle">yes</text>
<rect x="560" y="104" width="170" height="34" rx="7" fill="var(--surface)" stroke="var(--danger)" stroke-width="1.4"/>
<text x="645" y="125" font-size="7.8" fill="var(--danger-text)" font-weight="700" text-anchor="middle">REJECT -> defer / skip</text>
<line x1="490" y1="98" x2="558" y2="118" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="524" y="116" font-size="6.6" fill="var(--danger-text)" text-anchor="middle">no</text>
<text x="120" y="168" font-size="8" fill="var(--text-secondary)" font-weight="700">clear view -> tight covariance</text>
<ellipse cx="120" cy="210" rx="18" ry="12" fill="var(--accent)" fill-opacity="0.18" stroke="var(--accent)"/>
<circle cx="120" cy="210" r="2.5" fill="var(--accent)"/>
<circle cx="120" cy="210" r="40" fill="none" stroke="var(--text-muted)" stroke-dasharray="3 3"/>
<text x="120" y="236" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">fits threshold: accept</text>
<text x="400" y="168" font-size="8" fill="var(--text-secondary)" font-weight="700">heavy occlusion -> covariance inflates</text>
<ellipse cx="410" cy="210" rx="52" ry="30" fill="var(--danger)" fill-opacity="0.14" stroke="var(--danger)"/>
<circle cx="410" cy="210" r="2.5" fill="var(--danger)"/>
<circle cx="410" cy="210" r="40" fill="none" stroke="var(--text-muted)" stroke-dasharray="3 3"/>
<text x="410" y="246" font-size="6.6" fill="var(--danger-text)" text-anchor="middle">exceeds threshold: reject</text>
<text x="20" y="262" font-size="7.6" fill="var(--text-muted)">Refusing an untrustworthy target is uncertainty-driven decision-making in miniature: the gate protects the grasp from acting on a pose it cannot trust. Section 6.6.</text>
</svg>