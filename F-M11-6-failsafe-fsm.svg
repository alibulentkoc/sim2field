<svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A fail-safe and fail-operational state machine: from normal operation a recoverable fault degrades to reduced operation (fail-operational) while an unrecoverable fault or the safety monitor forces a safe stop (fail-safe); the safe state is reachable from every state and the reaction path must complete before harm occurs." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Fail-safe / fail-operational state machine</text>
<rect x="60" y="70" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="150.0" y="90" font-size="9" fill="var(--accent)" font-weight="700" text-anchor="middle">NORMAL</text>
<text x="150.0" y="104" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">full mission capability</text>
<rect x="300" y="70" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.6"/>
<text x="390.0" y="90" font-size="9" fill="var(--warn)" font-weight="700" text-anchor="middle">DEGRADED</text>
<text x="390.0" y="104" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">fail-operational: reduced</text>
<rect x="540" y="150" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--danger)" stroke-width="1.6"/>
<text x="630.0" y="170" font-size="9" fill="var(--danger)" font-weight="700" text-anchor="middle">SAFE STOP</text>
<text x="630.0" y="184" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">fail-safe: bounded halt</text>
<line x1="240" y1="88" x2="298" y2="88" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="269" y="82" font-size="6.6" fill="var(--warn-text)" text-anchor="middle">recoverable</text>
<text x="269" y="98" font-size="6.6" fill="var(--warn-text)" text-anchor="middle">fault</text>
<line x1="300" y1="108" x2="240" y2="108" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#a)"/>
<text x="269" y="120" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">recover</text>
<path d="M 180,120 Q 360,200 538,175" fill="none" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="420" y1="120" x2="540" y2="160" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="300" y="205" font-size="6.8" fill="var(--danger-text)" text-anchor="middle">unrecoverable fault OR safety-monitor command (from any state)</text>
<rect x="60" y="150" width="420" height="52" rx="8" fill="var(--surface-2)" stroke="var(--danger)" stroke-opacity="0.5"/>
<text x="72" y="168" font-size="8" fill="var(--text-secondary)" font-weight="700">The safe state is reachable from EVERY state (the monitor's last resort).</text>
<text x="72" y="182" font-size="7.4" fill="var(--text-muted)">Reaction must beat harm:  L_detect + L_react  &lt;=  T_harm  (M11 Sec 7.4).</text>
<text x="72" y="195" font-size="7.4" fill="var(--text-muted)">Physical bounds (relief, compliance) act at physics speed and buy margin.</text>
<text x="20" y="232" font-size="8" fill="var(--text-muted)">Fail-operational keeps the mission going through recoverable faults; fail-safe halts safely when it cannot. Sections 6.6 and 7.4.</text>
<text x="20" y="246" font-size="7.4" fill="var(--text-muted)">A rare late cycle is a real failure: guarantee the worst case, not the average.</text>
</svg>