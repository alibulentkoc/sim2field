<svg viewBox="0 0 760 255" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ripeness cues mapped to sensing modalities: visible color cues (ground-spot color, tendril dieback, rind sheen) are read by RGB; internal water and sugar content by near-infrared and spectral sensing; and the pressurized shell's resonance by acoustic tap sensing; none is decisive alone, so the fusion stage and the learned classifier combine them." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Ripeness cue to sensing modality</text>
<rect x="30" y="60" width="230" height="22" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
<text x="40" y="75" font-size="7.4" fill="var(--text-secondary)">ground-spot color</text>
<line x1="260" y1="71" x2="470" y2="116" stroke="var(--info)" stroke-width="1.3" marker-end="url(#a)" opacity="0.85"/>
<rect x="30" y="86" width="230" height="22" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
<text x="40" y="101" font-size="7.4" fill="var(--text-secondary)">tendril / vine dieback</text>
<line x1="260" y1="97" x2="470" y2="116" stroke="var(--info)" stroke-width="1.3" marker-end="url(#a)" opacity="0.85"/>
<rect x="30" y="112" width="230" height="22" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
<text x="40" y="127" font-size="7.4" fill="var(--text-secondary)">rind sheen / texture</text>
<line x1="260" y1="123" x2="470" y2="116" stroke="var(--info)" stroke-width="1.3" marker-end="url(#a)" opacity="0.85"/>
<rect x="30" y="150" width="230" height="22" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
<text x="40" y="165" font-size="7.4" fill="var(--text-secondary)">internal water + sugar</text>
<line x1="260" y1="161" x2="470" y2="184" stroke="var(--accent-2)" stroke-width="1.3" marker-end="url(#a)" opacity="0.85"/>
<rect x="30" y="190" width="230" height="22" rx="5" fill="var(--surface)" stroke="var(--border-strong)"/>
<text x="40" y="205" font-size="7.4" fill="var(--text-secondary)">shell resonance (thump)</text>
<line x1="260" y1="201" x2="470" y2="220" stroke="var(--warn)" stroke-width="1.3" marker-end="url(#a)" opacity="0.85"/>
<rect x="472" y="92" width="150" height="26" rx="6" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<text x="547" y="109" font-size="8" fill="var(--info)" font-weight="700" text-anchor="middle">RGB (visible)</text>
<rect x="472" y="160" width="150" height="26" rx="6" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.5"/>
<text x="547" y="177" font-size="8" fill="var(--accent-2)" font-weight="700" text-anchor="middle">NIR / spectral</text>
<rect x="472" y="196" width="150" height="26" rx="6" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.5"/>
<text x="547" y="213" font-size="8" fill="var(--warn)" font-weight="700" text-anchor="middle">acoustic</text>
<text x="30" y="52" font-size="7" fill="var(--text-muted)">cues (from M2):</text>
<text x="472" y="84" font-size="7" fill="var(--text-muted)">modalities (M3 decides which to measure):</text>
<text x="640" y="105" font-size="6.6" fill="var(--text-muted)">-> fusion (M5)</text>
<text x="640" y="175" font-size="6.6" fill="var(--text-muted)">+ learned</text>
<text x="640" y="185" font-size="6.6" fill="var(--text-muted)">classifier (M4)</text>
<text x="20" y="232" font-size="7.8" fill="var(--text-muted)">Ripeness is probabilistic and multi-cue: no single cue is decisive, which is why later modules fuse modalities and learn from data rather than</text>
<text x="20" y="244" font-size="7.8" fill="var(--text-muted)">thresholding one channel. M3's job is to decide which bands and cues to measure so the information exists to be fused. Section 6.4.</text>
</svg>