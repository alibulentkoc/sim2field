<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sample size versus confidence: a success rate estimated from n trials has a confidence interval that narrows as n grows, so a single demo is one trial with no coverage and no evidence, while claiming high reliability requires many trials, and rare failures need very large samples or accelerated edge-case testing." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Sample size vs confidence</text>
<polygon points="110.0,66.0 181.6,66.0 260.0,66.0 331.6,66.0 410.0,70.9 481.6,79.2 560.0,84.4 560.0,96.8 481.6,102.0 410.0,110.3 331.6,126.5 260.0,152.8 181.6,204.2 110.0,230.0" fill="var(--info)" fill-opacity="0.14"/>
<polyline points="110.0,66.0 181.6,66.0 260.0,66.0 331.6,66.0 410.0,70.9 481.6,79.2 560.0,84.4" fill="none" stroke="var(--info)" stroke-width="1.4"/>
<polyline points="110.0,230.0 181.6,204.2 260.0,152.8 331.6,126.5 410.0,110.3 481.6,102.0 560.0,96.8" fill="none" stroke="var(--info)" stroke-width="1.4"/>
<line x1="110" y1="91" x2="560" y2="91" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="560" y="86.6" font-size="7" fill="var(--accent)" font-weight="end" text-anchor="end">estimate p_hat</text>
<circle cx="110.0" cy="90.6" r="4" fill="var(--danger)"/>
<text x="116.0" y="200.2" font-size="6.8" fill="var(--danger-text)">n=1: the demo</text>
<text x="116.0" y="213.32" font-size="6.2" fill="var(--danger-text)">huge interval, no coverage</text>
<line x1="110" y1="62" x2="110" y2="230" stroke="var(--border-strong)" stroke-width="1.4"/>
<line x1="110" y1="230" x2="560" y2="230" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="102" y="148.0" text-anchor="middle" font-size="8" fill="var(--text-muted)" transform="rotate(-90 102 148.0)">success rate + confidence interval</text>
<text x="335.0" y="258" font-size="8" fill="var(--text-muted)" text-anchor="middle">sample size n (log scale)  -></text>
<text x="110.0" y="244" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">1</text>
<text x="260.0" y="244" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">10</text>
<text x="410.0" y="244" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">100</text>
<text x="560.0" y="244" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">1000</text>
<rect x="580" y="66" width="162" height="120" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="592" y="86" font-size="7.6" fill="var(--text-primary)" font-weight="700">A claim is statistical:</text>
<text x="592" y="104" font-size="6.8" fill="var(--text-muted)">- interval narrows with n</text>
<text x="592" y="120" font-size="6.8" fill="var(--text-muted)">- high reliability needs</text>
<text x="592" y="130" font-size="6.8" fill="var(--text-muted)">  many trials</text>
<text x="592" y="148" font-size="6.8" fill="var(--text-muted)">- rare failures need very</text>
<text x="592" y="158" font-size="6.8" fill="var(--text-muted)">  large n or accelerated /</text>
<text x="592" y="168" font-size="6.8" fill="var(--text-muted)">  edge-case testing</text>
<text x="20" y="256" font-size="7.8" fill="var(--text-muted)">Coverage of the operating envelope (fruit, slope, light, dust) must make the sample represent the field. "It worked in the demo" is n=1, not evidence. Section 6.3.</text>
</svg>