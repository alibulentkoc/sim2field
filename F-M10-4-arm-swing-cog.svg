<svg viewBox="0 0 760 275" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dynamic stability with arm swing: swinging the payload shifts the center of gravity laterally by the fruit mass times the swing radius over the total mass; on a side slope the worst case is the swing toward the downhill edge, which subtracts from the already reduced slope margin, so the design must keep that reduced margin above the safety margin." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Arm-swing CoG shift erodes the stability margin</text>
<line x1="60" y1="210" x2="440" y2="150" stroke="var(--border-strong)" stroke-width="2.5"/>
<text x="70" y="206" font-size="7" fill="var(--text-muted)">side slope &#952;</text>
<polygon points="150,182 320,155 320,120 150,147" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.3"/>
<circle cx="160" cy="178" r="6" fill="var(--surface-2)" stroke="var(--text-muted)"/>
<circle cx="312" cy="154" r="6" fill="var(--surface-2)" stroke="var(--text-muted)"/>
<text x="312" y="196" font-size="6.4" fill="var(--danger-text)" text-anchor="middle">downhill edge</text>
<circle cx="235" cy="140" r="5" fill="var(--accent)"/>
<text x="227" y="134" font-size="6.6" fill="var(--accent)" text-anchor="end">CoG</text>
<circle cx="272" cy="135" r="5" fill="var(--danger)"/>
<line x1="235" y1="140" x2="272" y2="135" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="253.5" y="132" font-size="6.8" fill="var(--danger-text)" font-weight="700" text-anchor="middle">&#916;</text>
<path d="M 235,110 A 40 40 0 0 1 285,128" fill="none" stroke="var(--accent-2)" stroke-width="1.3" stroke-dasharray="3 2" marker-end="url(#a)"/>
<text x="250" y="100" font-size="6.6" fill="var(--accent-2)">arm swings payload downhill</text>
<line x1="272" y1="164" x2="312" y2="164" stroke="var(--warn)" stroke-width="1.4"/>
<text x="292.0" y="176" font-size="6.4" fill="var(--warn-text)" text-anchor="middle">reduced margin</text>
<rect x="470" y="70" width="272" height="120" rx="9" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="484" y="90" font-size="8.4" fill="var(--accent-2)" font-weight="700">&#916; = m_fruit r_swing / m_total</text>
<text x="484" y="110" font-size="7.4" fill="var(--text-secondary)">slope margin:</text>
<text x="484" y="123" font-size="7.2" fill="var(--text-muted)">margin(&#952;) = (w/2)cos&#952; - h sin&#952;</text>
<text x="484" y="143" font-size="7.6" fill="var(--danger-text)" font-weight="700">worst case: margin(&#952;_max) - &#916;_max</text>
<text x="484" y="163" font-size="7.4" fill="var(--accent)">require  &gt;=  safety margin</text>
<text x="484" y="181" font-size="6.6" fill="var(--text-muted)">couples arm motion (M8/M9) to base design</text>
<text x="20" y="250" font-size="7.8" fill="var(--text-muted)">The swing toward the downhill edge subtracts from the slope margin. This may constrain the arm's swing trajectory or the maximum working slope:</text>
<text x="20" y="262" font-size="7.8" fill="var(--text-muted)">stability is a whole-machine property (arm, payload, slope, and base together). Section 7.3.</text>
</svg>