<text x="550.0" y="80" font-size="7" fill="var(--info)" text-anchor="middle">contact/fluid</text>
<text x="670.0" y="80" font-size="7" fill="var(--info)" text-anchor="middle">HIL / field</text>
<text x="30" y="106.0" font-size="7.6" fill="var(--text-secondary)">reach / workspace</text>
