<svg viewBox="0 0 760 356" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The four-part acceptance argument: works, proven, safe, and pays, each on admissible evidence, all four required to support the deploy decision, whose honest tri-state is deploy, deploy-with-limits, or not-yet; it is a case made to be reviewed and attacked, not an assertion." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<rect x="256" y="30" width="248" height="46" rx="9" fill="var(--surface)" stroke="var(--text-primary)" stroke-width="1.5"/>
<text x="380" y="49" text-anchor="middle" font-size="10" fill="var(--text-primary)" font-weight="700">ACCEPTANCE / DEPLOY DECISION</text>
<rect x="272" y="60" width="46" height="13" rx="6.5" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)"/>
<text x="295" y="69" text-anchor="middle" font-size="6.8" fill="var(--accent)">deploy</text>
<rect x="324.4" y="60" width="111" height="13" rx="6.5" fill="var(--warn)" fill-opacity="0.16" stroke="var(--warn)"/>
<text x="380" y="69" text-anchor="middle" font-size="6.8" fill="var(--warn)">deploy-with-limits</text>
<rect x="441.59999999999997" y="60" width="52" height="13" rx="6.5" fill="var(--danger)" fill-opacity="0.16" stroke="var(--danger)"/>
<text x="467" y="69" text-anchor="middle" font-size="6.8" fill="var(--danger)">not-yet</text>
<circle cx="380" cy="98" r="13" fill="var(--surface-2)" stroke="var(--accent-strong)" stroke-width="1.4"/>
<text x="380" y="101" text-anchor="middle" font-size="8" fill="var(--accent-strong)" font-weight="700">AND</text>
<line x1="380" y1="85" x2="380" y2="76" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<text x="398" y="96" font-size="6.8" fill="var(--text-muted)">all four must hold</text>
<rect x="40" y="138" width="160" height="150" rx="9" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
<rect x="40" y="138" width="160" height="24" rx="9" fill="var(--accent)" fill-opacity="0.14"/>
<text x="120.0" y="154" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">WORKS</text>
<text x="50" y="178" font-size="7.4" fill="var(--text-secondary)">meets the functional</text>
<text x="50" y="191" font-size="7.4" fill="var(--text-secondary)">mission: marketable</text>
<text x="50" y="204" font-size="7.4" fill="var(--text-secondary)">melons within cycle-</text>
<text x="50" y="217" font-size="7.4" fill="var(--text-secondary)">time + placement</text>
<text x="50" y="230" font-size="7.4" fill="var(--text-secondary)">budgets (CEC-01/02/03)</text>
<text x="50" y="280" font-size="7" fill="var(--text-muted)" font-style="italic">source: M13</text>
<line x1="120.0" y1="138" x2="380" y2="111" stroke="var(--border)" stroke-width="1"/>
<rect x="220" y="138" width="160" height="150" rx="9" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<rect x="220" y="138" width="160" height="24" rx="9" fill="var(--info)" fill-opacity="0.14"/>
<text x="300.0" y="154" text-anchor="middle" font-size="11" fill="var(--info)" font-weight="700">PROVEN</text>
<text x="230" y="178" font-size="7.4" fill="var(--text-secondary)">verified and validated</text>
<text x="230" y="191" font-size="7.4" fill="var(--text-secondary)">(M14); each claim at</text>
<text x="230" y="204" font-size="7.4" fill="var(--text-secondary)">its appropriate</text>
<text x="230" y="217" font-size="7.4" fill="var(--text-secondary)">fidelity; unproven</text>
<text x="230" y="230" font-size="7.4" fill="var(--text-secondary)">items flagged</text>
<text x="230" y="280" font-size="7" fill="var(--text-muted)" font-style="italic">source: M14</text>
<line x1="300.0" y1="138" x2="380" y2="111" stroke="var(--border)" stroke-width="1"/>
<rect x="400" y="138" width="160" height="150" rx="9" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.5"/>
<rect x="400" y="138" width="160" height="24" rx="9" fill="var(--accent-2)" fill-opacity="0.14"/>
<text x="480.0" y="154" text-anchor="middle" font-size="11" fill="var(--accent-2)" font-weight="700">SAFE</text>
<text x="410" y="178" font-size="7.4" fill="var(--text-secondary)">certified safety case</text>
<text x="410" y="191" font-size="7.4" fill="var(--text-secondary)">(M15); independence</text>
<text x="410" y="204" font-size="7.4" fill="var(--text-secondary)">established; residual</text>
<text x="410" y="217" font-size="7.4" fill="var(--text-secondary)">risk stated and</text>
<text x="410" y="230" font-size="7.4" fill="var(--text-secondary)">acceptable</text>
<text x="410" y="280" font-size="7" fill="var(--text-muted)" font-style="italic">source: M15</text>
<line x1="480.0" y1="138" x2="380" y2="111" stroke="var(--border)" stroke-width="1"/>
<rect x="580" y="138" width="160" height="150" rx="9" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.5"/>
<rect x="580" y="138" width="160" height="24" rx="9" fill="var(--warn)" fill-opacity="0.14"/>
<text x="660.0" y="154" text-anchor="middle" font-size="11" fill="var(--warn)" font-weight="700">PAYS</text>
<text x="590" y="178" font-size="7.4" fill="var(--text-secondary)">deployment case (M16)</text>
<text x="590" y="191" font-size="7.4" fill="var(--text-secondary)">beats the alternative</text>
<text x="590" y="204" font-size="7.4" fill="var(--text-secondary)">in a defined envelope;</text>
<text x="590" y="217" font-size="7.4" fill="var(--text-secondary)">a projection until</text>
<text x="590" y="230" font-size="7.4" fill="var(--text-secondary)">the pilot</text>
<text x="590" y="280" font-size="7" fill="var(--text-muted)" font-style="italic">source: M16</text>
<line x1="660.0" y1="138" x2="380" y2="111" stroke="var(--border)" stroke-width="1"/>
<text x="20" y="316" font-size="8.4" fill="var(--text-secondary)">Each part rests on admissible evidence at its stated fidelity (CEC-06). The argument is honest about fidelity and residual.</text>
<text x="20" y="332" font-size="8.4" fill="var(--text-muted)">It is a CASE, made to be reviewed and attacked (EI-15), not an assertion. If any part fails, the decision degrades to deploy-with-limits or not-yet.</text>
</svg>