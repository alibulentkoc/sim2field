<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The sim-to-real pipeline trains the grasp policy in the digital twin (imitation learning bootstraps, reinforcement learning refines), randomizes across a distribution of contact, fruit, sensor, and lighting parameters so the policy is robust rather than tuned to one simulator, transfers to the machine, and validates against real data; the reality gap is measured and closed by widening the randomization." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The sim-to-real pipeline (CEC-05)</text>
<rect x="30" y="76" width="168" height="66" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<text x="114.0" y="96" font-size="8.6" fill="var(--info)" font-weight="700" text-anchor="middle">TRAIN IN SIM</text>
<text x="114.0" y="114" font-size="6.6" fill="var(--text-secondary)" text-anchor="middle">imitation + RL in the twin</text>
<text x="114.0" y="128" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">massive, safe, cheap episodes</text>
<line x1="198" y1="109" x2="210" y2="109" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="210" y="76" width="168" height="66" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.5"/>
<text x="294.0" y="96" font-size="8.6" fill="var(--accent-2)" font-weight="700" text-anchor="middle">RANDOMIZE</text>
<text x="294.0" y="114" font-size="6.6" fill="var(--text-secondary)" text-anchor="middle">domain randomization over p(&#958;)</text>
<text x="294.0" y="128" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">contact, friction, mass, noise, light</text>
<line x1="378" y1="109" x2="390" y2="109" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="390" y="76" width="168" height="66" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5"/>
<text x="474.0" y="96" font-size="8.6" fill="var(--accent)" font-weight="700" text-anchor="middle">TRANSFER</text>
<text x="474.0" y="114" font-size="6.6" fill="var(--text-secondary)" text-anchor="middle">deploy to the machine</text>
<line x1="558" y1="109" x2="570" y2="109" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="570" y="76" width="168" height="66" rx="8" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.5"/>
<text x="654.0" y="96" font-size="8.6" fill="var(--warn)" font-weight="700" text-anchor="middle">VALIDATE</text>
<text x="654.0" y="114" font-size="6.6" fill="var(--text-secondary)" text-anchor="middle">against real data</text>
<text x="654.0" y="128" font-size="6.2" fill="var(--text-muted)" text-anchor="middle">measure the reality gap</text>
<path d="M 654.0,142 L 654.0,172 L 294.0,172 L 294.0,142" fill="none" stroke="var(--danger)" stroke-width="1.4" stroke-dasharray="4 2" marker-end="url(#a)"/>
<text x="474.0" y="182" font-size="7" fill="var(--danger-text)" font-weight="anc=middle">if the gap is too large, widen / retune p(&#958;) and repeat</text>
<rect x="30" y="196" width="712" height="26" rx="7" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.5"/>
<text x="44" y="213" font-size="7.8" fill="var(--accent)" font-weight="700">&#960;* = argmax_&#960;  E over &#958;~p(&#958;) [ E_&#960;[G | &#958;] ]   -   optimal in expectation across a broad p(&#958;) -> robust to the real &#958;.</text>
<text x="20" y="244" font-size="7.8" fill="var(--text-muted)">Neither imitation nor RL can be trained on real fruit at scale (too slow, too destructive), so training is in the twin. Never trust a policy that has</text>
<text x="20" y="256" font-size="7.8" fill="var(--text-muted)">only seen the simulator; the reality gap is measured by validating real vs sim and closed by widening the randomization. Sections 6.4 and 7.3.</text>
</svg>