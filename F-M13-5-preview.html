<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M13-5 preview - Composed budgets</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--text-on-accent:#0e120d;--accent:#9bcf3b;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4}

.figure{max-width:840px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}

<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Composed budgets versus limits: the placement, cycle-time, and power budgets are assembled from all real contributors at once and each tested against its limit; composition can reveal an emergent overrun no single allocation predicted, shown as the cycle-time budget pushed toward its limit by shared-resource effects." font-family="'IBM Plex Mono',monospace">

</svg></div><figcaption><span class="fid">F-M13-5</span>Composed budgets vs limits. The placement, cycle-time, and power budgets are assembled from all real contributors at once and each tested against its limit; composition can reveal an emergent overrun no single allocation predicted, shown as shared-resource effects pushing the cycle-time budget toward its limit. Companion to the coupling map. Fractions of limit, illustrative. Module 13, Sections 6.5 and 7.2.</figcaption></figure></body></html>
