<text x="20" y="252" font-size="7.8" fill="var(--text-muted)">A claim is only as strong as the rung its evidence lives on. The matrix flags where only hardware/field data is admissible (grasp-no-bruise: the</text>
<text x="20" y="264" font-size="7.8" fill="var(--text-muted)">CR-03 contact rung + field; timing: HIL under load). An unvalidated or under-fidelity twin result is not admissible evidence (CEC-06). Section 6.2.</text>
