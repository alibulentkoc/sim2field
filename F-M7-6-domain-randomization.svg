<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Domain randomization and the reality gap: training over a randomization distribution of simulator parameters makes the policy robust to the real value it later meets, but a too-narrow distribution overfits the simulator and leaves a large reality gap, while a too-wide distribution degrades peak performance, the robustness-optimality tradeoff." font-family="'IBM Plex Mono',monospace">
