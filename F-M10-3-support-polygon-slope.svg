<defs><marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--warn)"/></marker></defs>
<text x="474" y="114" font-size="8" fill="var(--warn)">arm swing shifts CoG by &#916;</text>
<line x1="466" y1="118" x2="466" y2="284" stroke="var(--warn)" stroke-width="1.2" stroke-dasharray="4 3"/>
<rect x="560" y="150" width="188" height="150" rx="9" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="572" y="170" font-size="9" fill="var(--text-primary)" font-weight="700">Side-slope stability</text>
<text x="572" y="190" font-size="8.5" fill="var(--text-secondary)">tan &#952;_tip = (w/2) / h</text>
<text x="572" y="207" font-size="8" fill="var(--text-muted)">margin(&#952;) =</text>
<text x="580" y="220" font-size="8" fill="var(--text-muted)">(w/2)cos&#952; - h&#183;sin&#952;</text>
<text x="572" y="240" font-size="8" fill="var(--text-muted)">wider w, lower h -&gt; higher tip angle</text>
<text x="572" y="260" font-size="8.5" fill="var(--warn)">worst case: margin(&#952;) - &#916;</text>
<text x="572" y="273" font-size="7.8" fill="var(--text-muted)">require margin - &#916; &#8805; safety margin</text>
<text x="572" y="291" font-size="7.8" fill="var(--text-muted)">stability is a whole-machine property</text>
<text x="20" y="352" font-size="8.8" fill="var(--text-secondary)">The machine stays upright while the CoG projects inside the support polygon (wheel footprint). Tip-over impends as the</text>
<text x="20" y="365" font-size="8.8" fill="var(--text-muted)">projection reaches the downhill edge; a laterally swung payload erodes the margin, so base and arm cannot be designed apart.</text>
</svg>