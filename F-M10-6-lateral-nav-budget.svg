<svg viewBox="0 0 760 255" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The lateral navigation budget: the lateral placement error (bed-centering and localization combined in quadrature) must keep the fruit inside the manipulator's workspace, so three sigma of the lateral error must not exceed the workspace half-width minus a margin, which sizes the required navigation accuracy against the reachable width." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Lateral navigation budget vs workspace half-width</text>
<line x1="380" y1="70" x2="380" y2="150" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="380" y="64" font-size="7" fill="var(--accent)" text-anchor="middle">bed center / workspace center</text>
<rect x="130" y="96" width="500" height="28" rx="5" fill="var(--accent)" fill-opacity="0.10" stroke="var(--accent)"/>
<text x="136" y="113" font-size="6.8" fill="var(--accent)">workspace (W_workspace, from M8)</text>
<line x1="630" y1="90" x2="630" y2="130" stroke="var(--accent)" stroke-width="1.2"/>
<text x="630" y="84" font-size="6.6" fill="var(--accent)" text-anchor="middle">+W/2</text>
<rect x="590" y="96" width="40" height="28" fill="var(--warn)" fill-opacity="0.2"/>
<text x="610" y="140" font-size="6.2" fill="var(--warn-text)" text-anchor="middle">margin</text>
<line x1="200" y1="110" x2="560" y2="110" stroke="var(--info)" stroke-width="2.4"/>
<line x1="560" y1="102" x2="560" y2="118" stroke="var(--info)" stroke-width="1.6"/>
<text x="564" y="108" font-size="6.8" fill="var(--info)">3&#963;_lat</text>
<text x="380" y="152" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">3&#963;_lat must fit inside W/2 - margin</text>
<rect x="220" y="176" width="320" height="46" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="234" y="196" font-size="8.6" fill="var(--accent)" font-weight="700">3 &#963;_lat  &lt;=  W_workspace/2 - margin</text>
<text x="234" y="212" font-size="7" fill="var(--text-muted)">&#963;_lat = sqrt(&#963;_center^2 + &#963;_loc^2)  (bed-centering + localization)</text>
<text x="20" y="242" font-size="7.8" fill="var(--text-muted)">Keep the fruit in the workspace: the lateral budget sizes the navigation-accuracy requirement against the reachable width (CEC-03). Section 7.4.</text>
</svg>