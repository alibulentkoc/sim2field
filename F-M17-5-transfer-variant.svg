<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Transfer to a variant: moving to a different crop, platform, or constraint changes the parameters and values (fruit properties, geometry, budgets, envelope) but keeps the tools and method (the six core concepts and the judgment insights); a student who can re-derive a new machine with the same tools has learned the course, not the case study." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Transfer: the tools are general</text>
<rect x="30" y="56" width="345" height="150" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="46" y="76" font-size="9.5" fill="var(--accent)" font-weight="700">WHAT STAYS (the tools)</text>
<text x="46" y="96" font-size="7" fill="var(--text-secondary)">- Grip-Force Window (CEC-02)</text>
<text x="46" y="111" font-size="7" fill="var(--text-secondary)">- placement error budget (CEC-03)</text>
<text x="46" y="126" font-size="7" fill="var(--text-secondary)">- signal-to-action spine (CEC-01)</text>
<text x="46" y="141" font-size="7" fill="var(--text-secondary)">- fidelity ladder (CEC-06)</text>
<text x="46" y="156" font-size="7" fill="var(--text-secondary)">- dominant-term discipline (EI-05)</text>
<text x="46" y="171" font-size="7" fill="var(--text-secondary)">- bounded-learner rule (EI-07)</text>
<text x="46" y="186" font-size="7" fill="var(--text-secondary)">- the method of physical-AI design</text>
<rect x="385" y="56" width="345" height="150" rx="10" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.6"/>
<text x="401" y="76" font-size="9.5" fill="var(--warn-text)" font-weight="700">WHAT CHANGES (the values)</text>
<text x="401" y="96" font-size="7" fill="var(--text-secondary)">- crop: delicate berry / heavy squash</text>
<text x="401" y="111" font-size="7" fill="var(--text-secondary)">- fruit mass, size, bruise thresholds</text>
<text x="401" y="126" font-size="7" fill="var(--text-secondary)">- gripper geometry + force window</text>
<text x="401" y="141" font-size="7" fill="var(--text-secondary)">- platform, track width, workspace</text>
<text x="401" y="156" font-size="7" fill="var(--text-secondary)">- the operating / deployment envelope</text>
<text x="401" y="171" font-size="7" fill="var(--text-secondary)">- every budget's numbers</text>
<text x="401" y="186" font-size="7" fill="var(--text-secondary)">- the constraints (terrain, cost, human)</text>
<text x="20" y="228" font-size="7.8" fill="var(--text-secondary)" font-weight="700">None of the tools is watermelon-specific; they are the design tools of physical-AI systems.</text>
<text x="20" y="240" font-size="7.8" fill="var(--text-muted)">A student who can re-derive a new machine with them has learned the course, not the case study (EI-17). Section 6.5.</text>
</svg>