<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Domain randomization and the reality gap</text>
<line x1="90" y1="210" x2="560" y2="210" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="325.0" y="232" font-size="7.6" fill="var(--text-muted)" text-anchor="middle">simulator parameter &#958; (contact, friction, mass, noise, lighting)  -></text>
