<text x="180" y="304" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">the fault could be any of O(n^2) pairwise interactions</text>
<text x="180" y="268" text-anchor="middle" font-size="7.4" fill="var(--danger-text)">O(n^2) interaction search</text>
