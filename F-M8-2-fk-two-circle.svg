<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Forward kinematics of the rail-mounted parallel mechanism: given the two actuator lengths, the gripper point G is an intersection of two circles centred on the rail anchors; there are two solutions and the mechanism assembly fixes which branch is used." font-family="'IBM Plex Mono',monospace">
<circle cx="300" cy="196" r="149.9" fill="none" stroke="var(--info)" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4 3"/>
<circle cx="500" cy="196" r="138.9" fill="none" stroke="var(--info)" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4 3"/>
<text x="195" y="91" font-size="8" fill="var(--info)">circle(B1, L1)</text>
<text x="569" y="96" font-size="8" fill="var(--info)">circle(B2, L2)</text>
<line x1="170" y1="196" x2="630" y2="196" stroke="var(--border-strong)" stroke-width="3"/>
<text x="176" y="188" font-size="8.5" fill="var(--text-muted)">rail (linear guide)</text>
<rect x="291" y="187" width="18" height="18" rx="3" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.5"/>
<text x="300" y="182" text-anchor="middle" font-size="10" fill="var(--text-secondary)" font-weight="700">B1</text>
<rect x="491" y="187" width="18" height="18" rx="3" fill="var(--surface)" stroke="var(--text-secondary)" stroke-width="1.5"/>
<text x="500" y="182" text-anchor="middle" font-size="10" fill="var(--text-secondary)" font-weight="700">B2</text>
<line x1="300" y1="196" x2="408" y2="92" stroke="var(--text-muted)" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="500" y1="196" x2="408" y2="92" stroke="var(--text-muted)" stroke-width="1.2" stroke-dasharray="4 3"/>
<circle cx="408" cy="92" r="5" fill="var(--surface)" stroke="var(--text-muted)" stroke-width="1.5"/>
<text x="418" y="95" font-size="8.5" fill="var(--text-muted)">G' (other solution, discarded by assembly)</text>
<line x1="300" y1="196" x2="408" y2="300" stroke="var(--accent)" stroke-width="2.4"/>
<line x1="500" y1="196" x2="408" y2="300" stroke="var(--accent)" stroke-width="2.4"/>
<text x="342" y="248" font-size="10" fill="var(--accent)" font-weight="700">L1</text>
<text x="458" y="248" font-size="10" fill="var(--accent)" font-weight="700">L2</text>
<circle cx="408" cy="300" r="6.5" fill="var(--accent)"/>
<text x="408" y="322" text-anchor="middle" font-size="10" fill="var(--accent)" font-weight="700">G  (gripper point, selected branch)</text>
<text x="20" y="352" font-size="9" fill="var(--text-secondary)">IK (direct): given G,  L_i = ||G - B_i||.    FK: given L1, L2,  G = circle(B1,L1) intersect circle(B2,L2).</text>
<text x="20" y="366" font-size="8.5" fill="var(--text-muted)">Two solutions (mirror across the rail); the branch is fixed by the mechanism assembly. This parallel arrangement is stiff and light.</text>
</svg>