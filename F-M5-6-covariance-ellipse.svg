<svg viewBox="0 0 760 344" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Covariance ellipse versus capture tolerance: a grasp is feasible when the 3-sigma pose-error ellipse fits inside the capture-tolerance circle, and infeasible when it exceeds it; the fix is to shrink the covariance or widen the tolerance." font-family="'IBM Plex Mono',monospace">
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Grasp feasibility: pose uncertainty vs capture tolerance</text>
<text x="380" y="44" text-anchor="middle" font-size="8.3" fill="var(--text-muted)">the 3-sigma ellipse is the pose covariance (M5); the circle is the tolerance the Grip-Force Window sets (CEC-02). Test: 3-sigma_place &lt;= c.</text>
<circle cx="206" cy="180" r="92" fill="none" stroke="var(--info)" stroke-width="1.6" stroke-dasharray="5 3"/>
<text x="206" y="80" text-anchor="middle" font-size="7.8" fill="var(--info)">capture tolerance (radius c)</text>
<ellipse cx="206" cy="180" rx="52" ry="32" transform="rotate(-22 206 180)" fill="var(--accent)" fill-opacity="0.16" stroke="var(--accent)" stroke-width="1.8"/>
<circle cx="206" cy="180" r="3.5" fill="var(--text-primary)"/>
<text x="206" y="184" font-size="7" fill="var(--text-muted)"> </text>
<text x="206" y="300" text-anchor="middle" font-size="10.5" fill="var(--accent)" font-weight="700">FEASIBLE   3&#963; &lt;= c</text>
<text x="206" y="315" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">the 3&#963; pose ellipse fits inside the tolerance</text>
<circle cx="556" cy="180" r="92" fill="none" stroke="var(--info)" stroke-width="1.6" stroke-dasharray="5 3"/>
<text x="556" y="80" text-anchor="middle" font-size="7.8" fill="var(--info)">capture tolerance (radius c)</text>
<ellipse cx="556" cy="180" rx="120" ry="60" transform="rotate(-22 556 180)" fill="var(--danger)" fill-opacity="0.16" stroke="var(--danger)" stroke-width="1.8"/>
<circle cx="556" cy="180" r="3.5" fill="var(--text-primary)"/>
<text x="556" y="184" font-size="7" fill="var(--text-muted)"> </text>
<text x="556" y="300" text-anchor="middle" font-size="10.5" fill="var(--danger-text)" font-weight="700">INFEASIBLE   3&#963; &gt; c</text>
<text x="556" y="315" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">shrink covariance (fuse more, stage closer)</text>
<text x="556" y="326" text-anchor="middle" font-size="7.6" fill="var(--text-muted)">or widen tolerance (more compliance, M2/M9)</text>
<circle cx="673" cy="133" r="3" fill="var(--danger)"/>
<circle cx="439" cy="227" r="3" fill="var(--danger)"/>
<text x="206" y="80" text-anchor="middle" font-size="7.8" fill="var(--accent)">3&#963; pose ellipse</text>
</svg>