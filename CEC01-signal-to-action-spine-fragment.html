<!-- CEC-01 embeddable fragment: the mission cycle-time budget interactive only.
     No page chrome, no hero, no derivation, no concept prose (the chapter owns
     those). Self-contained: scoped styles under .wx-embed, a container-scoped
     script, and semantic tokens resolved from the host :root. Inlined by the
     module renderer at the concept anchor; the standalone worked example remains
     the full-page target. ASCII only. -->
<section class="wx-embed" data-wx="cec01-spine" aria-label="Interactive: mission cycle-time budget">
<style>
  .wx-embed .instrument{background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);border-radius:14px;padding:1.7rem;margin:0}
  .wx-embed .inst-head{display:flex;justify-content:space-between;align-items:baseline;gap:1rem;flex-wrap:wrap;margin-bottom:1.3rem}
  .wx-embed .inst-title{font-family:var(--font-display);font-weight:600;font-size:1.05rem;color:var(--text-primary)}

  .wx-embed .reset:hover{background:var(--accent-strong);color:var(--text-on-accent)}
  .wx-embed .noscript-note{background:var(--tint-warn);color:var(--status-warn-text);border:1px solid var(--warn);border-radius:8px;padding:.8rem 1rem;font-size:.86rem;margin-bottom:1rem}
  .wx-embed .timeline{position:relative;height:60px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;display:flex;overflow:visible;margin-top:.3rem}
  .wx-embed .tstage{height:100%;position:relative;transition:width .35s cubic-bezier(.4,0,.2,1);min-width:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--surface-2)}
  .wx-embed .tstage.dom{outline:2px solid var(--marker);outline-offset:-2px;z-index:2}
  .wx-embed .tstage .tn{font-family:var(--font-mono);font-size:.58rem;color:var(--text-on-accent);font-weight:600;white-space:nowrap;opacity:0}
  .wx-embed .tstage.wide .tn{opacity:1}
  .wx-embed .budget-line{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--accent-strong);z-index:5}
  .wx-embed .budget-line .tag{position:absolute;top:-18px;transform:translateX(-50%);font-family:var(--font-mono);font-size:.62rem;font-weight:500;color:var(--accent);white-space:nowrap}
  .wx-embed .controls{display:flex;gap:1.4rem;flex-wrap:wrap;margin:1.3rem 0}
  .wx-embed .ctl-group{display:flex;flex-direction:column;gap:.4rem;min-width:180px}
  .wx-embed .ctl-group .lbl{font-family:var(--font-mono);font-size:.68rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted)}
  .wx-embed .ctl-group .lbl b{color:var(--text-primary)}
  .wx-embed input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:var(--border);outline-offset:4px;cursor:pointer}
  .wx-embed input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
  .wx-embed input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
  .wx-embed .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content}
  .wx-embed .seg button{font-family:var(--font-mono);font-size:.8rem;padding:.5rem .85rem;background:var(--surface-2);color:var(--text-muted);border:none;cursor:pointer;transition:.15s}
  .wx-embed .seg button+button{border-left:1px solid var(--border)}
  .wx-embed .seg button.on{background:var(--accent-strong);color:var(--text-on-accent);font-weight:600}
  .wx-embed .seg button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .wx-embed .readbar{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin:1.3rem 0 .3rem}
  .wx-embed .ro{background:var(--surface-2);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;padding:.7rem .8rem}
  .wx-embed .ro .lab{font-family:var(--font-mono);font-size:.6rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.3rem}
  .wx-embed .ro .val{font-family:var(--font-mono);font-size:1.1rem;font-weight:600;color:var(--text-primary)}
  .wx-embed .ro .val small{font-size:.58rem;color:var(--text-muted);font-weight:400}
  .wx-embed .ro .val.bad{color:var(--danger-text)}
  .wx-embed .ro .val.ok{color:var(--accent)}
  .wx-embed .status{padding:.9rem 1rem;border-radius:8px;border:1px solid;font-family:var(--font-mono);font-size:.74rem;font-weight:500;line-height:1.55;margin-top:1rem}
  .wx-embed .status.ok{border-color:var(--accent-strong);background:var(--tint-accent);color:var(--status-ok-text)}
  .wx-embed .status.warn{border-color:var(--warn);background:var(--tint-warn);color:var(--status-warn-text)}
  .wx-embed .status.bad{border-color:var(--danger-dim);background:var(--tint-danger);color:var(--status-danger-text)}
  .wx-embed .status b{color:var(--text-primary)}
  @media(max-width:640px){ .wx-embed .readbar{grid-template-columns:1fr 1fr} }
  @media(prefers-reduced-motion:reduce){ .wx-embed *{transition:none!important} }
</style>

  <div class="instrument">
    <div class="inst-head">
      <div class="inst-title">Mission cycle-time budget</div>
      <button class="reset" id="resetBtn" type="button">Reset</button>
    </div>

    <noscript><p class="noscript-note">This interactive cycle-time budget requires JavaScript. The worked result is in the derivation above: the naive single-arm cycle sums to 6.6 s (dominant stage SWING, 1.5 s), which forces the rover to 0.18 m/s - below the 0.20 m/s target - so the design must attack the dominant stage or change the architecture (a second arm) to meet T_cycle &lt;= 6.0 s.</p></noscript>

    <div class="barlab" style="display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:.66rem; font-weight:500; color:var(--text-muted); margin-bottom:.2rem"><span>mission cycle (s)</span><span>scale 0 - 8 s</span></div>
    <div class="timeline" id="timeline" role="img" aria-label="Mission-cycle timeline: the eight FSM stages sized by duration, against the 6-second budget line"></div>

    <div class="controls">
      <div class="ctl-group">
        <span class="lbl">SWING transfer time <b><span id="swingRead">1.5</span> s</b> (dominant)</span>
        <input type="range" id="swing" min="0.5" max="1.5" step="0.1" value="1.5" aria-label="SWING transfer time, seconds">
      </div>
      <div class="ctl-group">
        <span class="lbl" id="archLbl">architecture</span>
        <div class="seg" id="armSeg" role="group" aria-labelledby="archLbl">
          <button data-arms="1" class="on" type="button" aria-pressed="true">Single arm</button>
          <button data-arms="2" type="button" aria-pressed="false">Two arms</button>
        </div>
      </div>
    </div>

    <div class="readbar">
      <div class="ro"><div class="lab">cycle time</div><div class="val"><span id="roCycle">6.6</span> <small>s / 6.0</small></div></div>
      <div class="ro"><div class="lab">rover speed</div><div class="val"><span id="roSpeed">0.18</span> <small>m/s / 0.20</small></div></div>
      <div class="ro"><div class="lab">throughput</div><div class="val"><span id="roThru">545</span> <small>fruit/hr</small></div></div>
      <div class="ro"><div class="lab">dominant stage</div><div class="val" style="font-size:.95rem"><span id="roDom">SWING</span></div></div>
    </div>

    <div class="status warn" id="status" aria-live="polite"></div>
  </div>

<script>
/* Interactive enhancement only. All engineering content is static and readable
   with JavaScript disabled. Vanilla JS, no external dependencies. Colors come
   from semantic tokens, never raw hex. Scoped to its container so it is safe to
   inline into a chapter beside other content. */
(function(){
  "use strict";
  var root = (document.currentScript && document.currentScript.closest('.wx-embed'))
             || document.querySelector('.wx-embed[data-wx="cec01-spine"]');
  if(!root) return;
  var q = function(sel){ return root.querySelector(sel); };
  const SCALE=8.0;
  const BUDGET=6.0, V_TGT=0.20, d=1.2;
  const BASE=[
    {n:'DRIVE', t:0.3, c:'var(--stage-drive)'},
    {n:'STAGE', t:0.2, c:'var(--stage-stage)'},
    {n:'ALIGN', t:1.0, c:'var(--stage-align)'},
    {n:'GRAB', t:1.0, c:'var(--stage-grab)'},
    {n:'LIFT', t:0.8, c:'var(--stage-lift)'},
    {n:'SWING', t:1.5, c:'var(--stage-swing)'},
    {n:'LOWER', t:0.8, c:'var(--stage-lower)'},
    {n:'RELEASE', t:1.0, c:'var(--stage-release)'}
  ];
  let state={swing:1.5, arms:1};
  function stages(){ return BASE.map(s=> s.n==='SWING' ? {...s,t:state.swing} : {...s}); }
  function cycleSingle(st){ return st.reduce((a,s)=>a+s.t,0); }
  function cycleTwoArm(st){
    const fixed=st.filter(s=>s.n==='DRIVE'||s.n==='STAGE').reduce((a,s)=>a+s.t,0);
    const pick =st.filter(s=>!(s.n==='DRIVE'||s.n==='STAGE')).reduce((a,s)=>a+s.t,0);
    return fixed + pick/2;
  }
  const timeline=q('#timeline');
  if(!timeline) return;
  function pct(t){ return Math.min(100, t/SCALE*100); }
  function render(){
    const st=stages();
    const Tsingle=cycleSingle(st);
    const T = state.arms===2 ? cycleTwoArm(st) : Tsingle;
    const v = d/T;
    const thru = 3600/T;
    let dom=st[0]; st.forEach(s=>{ if(s.t>dom.t) dom=s; });
    let html='';
    st.forEach(s=>{
      const w=pct(state.arms===2 && !(s.n==='DRIVE'||s.n==='STAGE') ? s.t/2 : s.t);
      const isDom = s.n===dom.n && state.arms===1;
      html+=`<div class="tstage${isDom?' dom':''} ${w>6?'wide':''}" style="width:${w}%;background:${s.c}">`+
        `<span class="tn">${s.n}</span></div>`;
    });
    timeline.innerHTML = html +
      `<div class="budget-line" style="left:${pct(BUDGET)}%"><span class="tag">budget 6.0 s</span></div>`;
    const $=id=>root.querySelector('#'+id);
    $('swingRead').textContent=state.swing.toFixed(1);
    $('roCycle').textContent=T.toFixed(1);
    $('roCycle').className='val '+(T<=BUDGET?'ok':'bad');
    $('roSpeed').textContent=v.toFixed(2);
    $('roSpeed').className='val '+(v>=V_TGT?'ok':'bad');
    $('roThru').textContent=thru.toFixed(0);
    $('roDom').textContent = state.arms===2 ? 'pick parallel' : dom.n;
    const st_=$('status');
    if(state.arms===2){
      st_.className='status ok';
      st_.innerHTML=`<b>Two arms - architecture change.</b> The pick stages overlap across two arms, so the effective cycle is ${T.toFixed(1)} s: speed ${v.toFixed(2)} m/s and throughput ${thru.toFixed(0)} fruit/hr, well inside budget. Complexity moved to integration and control, but the mission number is met with room to spare.`;
    } else if(T<=BUDGET){
      st_.className='status ok';
      st_.innerHTML=`<b>Budget closes.</b> Cycle ${T.toFixed(1)} s (&lt;= 6.0), rover ${v.toFixed(2)} m/s (&gt;= 0.20 target), ${thru.toFixed(0)} fruit/hr. Attacking the dominant SWING stage brought the single-arm cycle inside budget - no second arm needed yet.`;
    } else {
      st_.className='status warn';
      st_.innerHTML=`<b>Over budget by ${(T-BUDGET).toFixed(1)} s.</b> Cycle ${T.toFixed(1)} s forces the rover to ${v.toFixed(2)} m/s - below the 0.20 m/s target. Attack the dominant <b>${dom.n}</b> stage (${dom.t.toFixed(1)} s), or switch to two arms.`;
    }
  }
  q('#swing').addEventListener('input',e=>{ state.swing=+e.target.value; render(); });
  q('#armSeg').addEventListener('click',e=>{
    if(e.target.tagName!=='BUTTON') return;
    state.arms=+e.target.dataset.arms;
    root.querySelectorAll('#armSeg button').forEach(b=>{ const on=b===e.target; b.classList.toggle('on',on); b.setAttribute('aria-pressed',on); });
    render();
  });
  q('#resetBtn').addEventListener('click',()=>{
    state={swing:1.5,arms:1};
    q('#swing').value=1.5;
    root.querySelectorAll('#armSeg button').forEach(b=>{ const on=b.dataset.arms==='1'; b.classList.toggle('on',on); b.setAttribute('aria-pressed',on); });
    render();
  });
  render();
})();
</script>
</section>
