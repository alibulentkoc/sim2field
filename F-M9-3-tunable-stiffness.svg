<svg viewBox="0 0 760 356" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tunable fluid stiffness: fluid stiffness rises with pressure and falls with trapped volume, so the grip can be made soft at low pressure and large volume for gentle contact or firm at high pressure and small volume for precise placement; in series with the structure the fluid can only soften, and the structure sets the stiffness floor." font-family="'IBM Plex Mono',monospace">
<line x1="78" y1="68" x2="78" y2="300" stroke="var(--border-strong)" stroke-width="1.5"/>
<line x1="78" y1="300" x2="430" y2="300" stroke="var(--border-strong)" stroke-width="1.5"/>
<path d="M74,72 L78,65 L82,72 z" fill="var(--border-strong)"/>
<path d="M430,296 L437,300 L430,304 z" fill="var(--border-strong)"/>
<text x="70" y="186.0" text-anchor="middle" font-size="9" fill="var(--text-muted)" transform="rotate(-90 70 186.0)">fluid stiffness k_fluid</text>
<text x="254.0" y="328" text-anchor="middle" font-size="9" fill="var(--text-muted)">line pressure P</text>
<line x1="78" y1="300" x2="430" y2="95" stroke="var(--accent)" stroke-width="2.4"/>
<text x="409" y="91" text-anchor="end" font-size="7.6" fill="var(--accent)">small V (firm)</text>
<line x1="78" y1="300" x2="430" y2="220" stroke="var(--info)" stroke-width="2" stroke-dasharray="5 3"/>
<text x="416" y="231" text-anchor="end" font-size="7.6" fill="var(--info)">large V (soft)</text>
<circle cx="184" cy="276" r="5" fill="var(--info)"/>
<text x="192" y="279" font-size="7.4" fill="var(--info)">soft: low P, large V (gentle contact, M2)</text>
<circle cx="360" cy="136" r="5" fill="var(--accent)"/>
<text x="352" y="130" text-anchor="end" font-size="7.4" fill="var(--accent)">firm: high P, small V (placement, M8)</text>
<rect x="84" y="74" width="196" height="30" rx="6" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="94" y="86" font-size="8.3" fill="var(--text-secondary)">k_fluid = A^2 &#946; / V</text>
<text x="94" y="98" font-size="7.6" fill="var(--text-muted)">gas: &#946; ~ nP  =&gt;  k_fluid &#8733; P/V</text>
<text x="470" y="58" font-size="9" fill="var(--text-primary)" font-weight="700">Effective stiffness (series)</text>
<line x1="470" y1="86" x2="590" y2="86" stroke="var(--text-secondary)" stroke-width="2"/>
<text x="596" y="90" font-size="7.6" fill="var(--text-muted)">structure / frame (M8)</text>
<polyline points="510,88 520,94 500,101 520,108 500,114 520,120 500,127 520,134 510,140" fill="none" stroke="var(--accent-2)" stroke-width="1.8"/>
<text x="528" y="117" font-size="7.8" fill="var(--accent-2)" font-weight="700">k_struct</text>
<polyline points="510,150 520,156 500,163 520,170 500,176 520,182 500,189 520,196 510,202" fill="none" stroke="var(--accent)" stroke-width="1.8"/>
<text x="528" y="179" font-size="7.8" fill="var(--accent)" font-weight="700">k_fluid</text>
<circle cx="510" cy="216" r="12" fill="var(--accent-2)" fill-opacity="0.3" stroke="var(--accent-2)"/>
<text x="510" y="219" text-anchor="middle" font-size="6.5" fill="var(--accent-2)">fruit</text>
<text x="470" y="250" font-size="8" fill="var(--text-secondary)">k_eff = (1/k_struct + 1/k_fluid)^-1</text>
<text x="470" y="266" font-size="7.8" fill="var(--warn-text)">the fluid can only SOFTEN; the structure sets the floor.</text>
<text x="470" y="286" font-size="7.8" fill="var(--text-muted)">&#969;_n = sqrt(k_fluid / m): more compliance</text>
<text x="470" y="298" font-size="7.8" fill="var(--text-muted)">-&gt; lower bandwidth (CEC-01 must still be met).</text>
<text x="20" y="344" font-size="8.3" fill="var(--text-muted)">The controllable stiffness reconciles M2's compliance demand (gentle, no-bruise) with M8's stiffness demand (precise placement).</text>
</svg>