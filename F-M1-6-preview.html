<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark">
<title>F-M1-6 preview - Error-budget allocation</title>
<style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;
--border:#2b3527;--border-strong:#3a4633;--grid-line:#1c231a;--text-primary:#eef2e6;
--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--accent-dim:#86ba35;
--info:#6fb0d9;--info-text:#bfe0f2}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem}
.figure{max-width:840px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto}
.figbody svg{display:block;width:100%;height:auto;min-width:560px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)}
.fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}
.note{max-width:840px;margin:1rem auto 0;font-size:.72rem;color:var(--text-muted)}</style></head>
<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placement error budget: four independent error sources combine by root-sum-square, then pass the three-sigma capture-tolerance gate; the tolerance allocates a maximum error to each subsystem." font-family="'IBM Plex Mono',monospace">
<defs><marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker><marker id="ahA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--info)"/></marker></defs>
<rect x="24" y="40" width="206" height="50" rx="7" fill="var(--surface)" stroke="var(--border)"/>
<text x="38" y="62" font-size="13" fill="var(--accent)" font-weight="700">&#963;<tspan dy="3" font-size="72%">loc</tspan><tspan dy="-3"> </tspan></text>
<text x="76" y="61" font-size="10" fill="var(--text-secondary)">perception / localization</text>
<text x="76" y="77" font-size="8.5" fill="var(--text-muted)">owned by M4 to M5</text>
<line x1="230" y1="65.0" x2="296" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="24" y="110" width="206" height="50" rx="7" fill="var(--surface)" stroke="var(--border)"/>
<text x="38" y="132" font-size="13" fill="var(--accent)" font-weight="700">&#963;<tspan dy="3" font-size="72%">he</tspan><tspan dy="-3"> </tspan></text>
<text x="76" y="131" font-size="10" fill="var(--text-secondary)">hand-eye calibration</text>
<line x1="230" y1="135.0" x2="296" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="24" y="180" width="206" height="50" rx="7" fill="var(--surface)" stroke="var(--border)"/>
<text x="38" y="202" font-size="13" fill="var(--accent)" font-weight="700">&#963;<tspan dy="3" font-size="72%">mech</tspan><tspan dy="-3"> </tspan></text>
<text x="76" y="201" font-size="10" fill="var(--text-secondary)">mechanism positioning</text>
<text x="76" y="217" font-size="8.5" fill="var(--text-muted)">owned by M8</text>
<line x1="230" y1="205.0" x2="296" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="24" y="250" width="206" height="50" rx="7" fill="var(--surface)" stroke="var(--border)"/>
<text x="38" y="272" font-size="13" fill="var(--accent)" font-weight="700">&#963;<tspan dy="3" font-size="72%">dyn</tspan><tspan dy="-3"> </tspan></text>
<text x="76" y="271" font-size="10" fill="var(--text-secondary)">dynamic / settling</text>
<line x1="230" y1="275.0" x2="296" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="300" y="150" width="140" height="64" rx="9" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-width="1.5"/>
<text x="370.0" y="176" text-anchor="middle" font-size="12" fill="var(--text-primary)" font-weight="700">root-sum-square</text>
<text x="370.0" y="194" text-anchor="middle" font-size="9" fill="var(--text-muted)">independent, zero-mean</text>
<line x1="440" y1="182.0" x2="474" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="478" y="163" width="84" height="38" rx="7" fill="var(--surface)" stroke="var(--accent-dim)"/>
<text x="520.0" y="187" text-anchor="middle" font-size="13" fill="var(--accent-dim)" font-weight="700">&#963;<tspan dy="3" font-size="72%">total</tspan></text>
<line x1="562" y1="182.0" x2="592" y2="182.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#ah)"/>
<rect x="596" y="150" width="150" height="64" rx="9" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="671.0" y="177" text-anchor="middle" font-size="13" fill="var(--accent)" font-weight="700">3&#183;&#963;<tspan dy="3" font-size="70%">total</tspan><tspan dy="-3"> &#8804; c</tspan></text>
<text x="671.0" y="196" text-anchor="middle" font-size="9" fill="var(--text-muted)">c &#8776; &#177;30 mm (capture)</text>
<line x1="671.0" y1="214" x2="671.0" y2="330" stroke="var(--info)" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="671.0" y1="330" x2="114" y2="330" stroke="var(--info)" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="114" y1="330" x2="114" y2="304" stroke="var(--info)" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#ahA)"/>
<text x="661.0" y="324" text-anchor="end" font-size="9" fill="var(--info-text)">allocation: c sets each subsystem's max error budget</text>
</svg></div>
<figcaption><span class="fid">F-M1-6</span>Placement error budget: allocation by root-sum-square. Four independent error sources combine by RSS and must clear the 3-sigma capture-tolerance gate (c about plus/minus 30 mm); the tolerance then allocates a maximum error back to each subsystem. Schematic of the Section 7.2 result.</figcaption></figure>
<div class="note">Preview only. Ships inline in module-01.html (both editions). No per-term values are shown because Section 7.2 does not assign them; the figure carries the structure and the allocation logic only.</div>
</body></html>
