<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thermal balance across the field envelope: component temperature is ambient plus generated and solar heat times the thermal resistance; a cooling design validated on a cool clean bench can exceed the temperature limit at the field edge (hot ambient, solar load, dust-degraded airflow) and be forced to throttle the compute, a cycle-time risk." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Thermal balance and the throttle point</text>
<line x1="150" y1="81" x2="700" y2="81" stroke="var(--danger)" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="700" y="76.42857142857144" font-size="7.8" fill="var(--danger-text)" text-anchor="end">T_limit</text>
<rect x="230" y="167.1" width="90" height="42.9" fill="var(--info)" fill-opacity="0.6" stroke="var(--info)" stroke-width="0.8"/>
<text x="275" y="191.57142857142856" font-size="6.4" fill="var(--text-on-accent)" text-anchor="middle">T_amb</text>
<rect x="230" y="120.0" width="90" height="47.1" fill="var(--accent)" fill-opacity="0.6" stroke="var(--accent)" stroke-width="0.8"/>
<text x="275" y="146.57142857142856" font-size="6.4" fill="var(--text-on-accent)" text-anchor="middle">Q_gen R</text>
<text x="275" y="224" font-size="7.6" fill="var(--text-secondary)" font-weight="700" text-anchor="middle">bench (20C, clean)</text>
<text x="275" y="115.0" font-size="7" fill="var(--text-primary)" text-anchor="middle">42&#176;C</text>
<rect x="430" y="113.6" width="90" height="96.4" fill="var(--warn)" fill-opacity="0.6" stroke="var(--warn)" stroke-width="0.8"/>
<text x="475" y="164.78571428571428" font-size="6.4" fill="var(--text-on-accent)" text-anchor="middle">T_amb 45</text>
<rect x="430" y="83.6" width="90" height="30.0" fill="var(--accent)" fill-opacity="0.6" stroke="var(--accent)" stroke-width="0.8"/>
<text x="475" y="101.57142857142857" font-size="6.4" fill="var(--text-on-accent)" text-anchor="middle">Q_gen R</text>
<rect x="430" y="62.1" width="90" height="21.4" fill="var(--danger)" fill-opacity="0.6" stroke="var(--danger)" stroke-width="0.8"/>
<text x="475" y="75.85714285714286" font-size="6.4" fill="var(--text-on-accent)" text-anchor="middle">Q_solar R + dust</text>
<text x="475" y="224" font-size="7.6" fill="var(--text-secondary)" font-weight="700" text-anchor="middle">field edge</text>
<text x="475" y="57.14285714285714" font-size="7" fill="var(--text-primary)" text-anchor="middle">69&#176;C</text>
<line x1="150" y1="56" x2="150" y2="210" stroke="var(--border-strong)" stroke-width="1.4"/>
<line x1="150" y1="210" x2="700" y2="210" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="142" y="135.0" text-anchor="middle" font-size="8" fill="var(--text-muted)" transform="rotate(-90 142 135.0)">component temperature</text>
<text x="560" y="46.14285714285714" font-size="7.2" fill="var(--danger-text)" font-weight="700" text-anchor="middle">exceeds T_limit</text>
<text x="560" y="56.14285714285714" font-size="6.6" fill="var(--danger-text)" text-anchor="middle">-> throttle (CEC-01 risk)</text>
<text x="20" y="244" font-size="7.8" fill="var(--text-muted)">T_comp = T_ambient + (Q_gen + Q_solar) R_thermal. Require T_comp &lt;= T_limit at worst-case ambient, with degraded R_thermal (dust) and added</text>
<text x="20" y="256" font-size="7.8" fill="var(--text-muted)">Q_solar. A bench validated on a cool clean day can throttle or shut down at the field edge. The thermal envelope is the real spec (EI-10). Sections 6.5 and 7.4.</text>
<text x="20" y="270" font-size="7.4" fill="var(--text-muted)">Illustrative temperatures [VERIFY@PUB].</text>
</svg>