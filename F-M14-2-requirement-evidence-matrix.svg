<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The requirement-to-evidence matrix names, for each requirement, the evidence and its fidelity rung, and flags where only hardware or field data is admissible: reach needs only a kinematic twin, stability a dynamic twin, grasp-will-not-bruise a validated contact rung plus field data, and timing hardware-in-the-loop under load; an unvalidated or under-fidelity twin result is not admissible evidence." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
