<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A sound data strategy has three parts feeding one dataset that must cover the field's variability: real field capture, expensive annotation, and synthetic generation in the twin (where labels are free and rare or hazardous cases can be manufactured), with domain randomization combating the sim-to-real gap; if the union fails to cover the field, the model inherits a blind spot." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Data strategy: real + annotated + synthetic</text>
<rect x="30" y="64" width="250" height="44" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="42" y="81" font-size="8.4" fill="var(--info)" font-weight="700">REAL CAPTURE</text>
<text x="42" y="94" font-size="6.6" fill="var(--text-muted)">field imagery: lighting,</text>
<text x="42" y="104" font-size="6.6" fill="var(--text-muted)">occlusion, maturity, cultivar</text>
<line x1="280" y1="86" x2="360" y2="140" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="30" y="116" width="250" height="44" rx="8" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.4"/>
<text x="42" y="133" font-size="8.4" fill="var(--warn)" font-weight="700">ANNOTATION</text>
<text x="42" y="146" font-size="6.6" fill="var(--text-muted)">boxes, masks, ripeness labels</text>
<text x="42" y="156" font-size="6.6" fill="var(--text-muted)">expensive, quality-critical</text>
<line x1="280" y1="138" x2="360" y2="140" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="30" y="168" width="250" height="44" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="42" y="185" font-size="8.4" fill="var(--accent-2)" font-weight="700">SYNTHETIC (twin)</text>
<text x="42" y="198" font-size="6.6" fill="var(--text-muted)">rendered scenes, free labels,</text>
<text x="42" y="208" font-size="6.6" fill="var(--text-muted)">rare/hazardous cases made</text>
<line x1="280" y1="190" x2="360" y2="140" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<text x="150" y="240" font-size="6.8" fill="var(--accent-2)">domain randomization (lighting, texture, pose, clutter) combats the sim-to-real gap</text>
<rect x="362" y="108" width="150" height="66" rx="9" fill="var(--surface-2)" stroke="var(--accent)" stroke-width="1.7"/>
<text x="437" y="132" font-size="8.6" fill="var(--accent)" font-weight="700" text-anchor="middle">DATASET</text>
<text x="437" y="148" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">must COVER the</text>
<text x="437" y="159" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">field variability</text>
<line x1="512" y1="141" x2="560" y2="141" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="562" y="118" width="170" height="46" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="647" y="140" font-size="8" fill="var(--info)" font-weight="700" text-anchor="middle">model (M4)</text>
<text x="647" y="154" font-size="6.4" fill="var(--text-muted)" font-weight="anc=middle">field competence</text>
<text x="20" y="258" font-size="7.8" fill="var(--text-muted)">The dataset is the product: field competence comes from data coverage. If the union does not cover the field's variability, the model inherits a blind spot (a distribution-shift failure). Section 6.5.</text>
</svg>