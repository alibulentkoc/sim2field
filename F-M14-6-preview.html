<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M14-6 preview - Reliability growth</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--info:#6fb0d9;--danger:#f0556a;--danger-text:#f697a4}

<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reliability grows across iterations over a season: each durability-test fix (calibration drift, filter clogging, seal wear, fastener loosening) raises mean time between failures toward the acceptance target; day-one testing cannot reveal these wear modes, so acceptance is a reliability target over a representative season, not a single good day." font-family="'IBM Plex Mono',monospace">
