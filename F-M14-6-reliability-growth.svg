<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reliability grows across iterations over a season: each durability-test fix (calibration drift, filter clogging, seal wear, fastener loosening) raises mean time between failures toward the acceptance target; day-one testing cannot reveal these wear modes, so acceptance is a reliability target over a representative season, not a single good day." font-family="'IBM Plex Mono',monospace">
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Reliability growth over a season</text>
<line x1="96" y1="66" x2="96" y2="252" stroke="var(--border-strong)" stroke-width="1.4"/>
<line x1="96" y1="252" x2="700" y2="252" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="88" y="161.0" text-anchor="middle" font-size="8.4" fill="var(--text-muted)" transform="rotate(-90 88 161.0)">MTBF (cycles between failures)</text>
<text x="398.0" y="292" text-anchor="middle" font-size="8.4" fill="var(--text-muted)">cumulative test over a representative season (thousands of cycles: wear, dust, heat, vibration) -&gt;</text>
<line x1="96" y1="97.3" x2="700" y2="97.3" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="6 3"/>
<text x="700" y="92.3" text-anchor="end" font-size="7.8" fill="var(--accent)" font-weight="700">acceptance reliability target</text>
<polyline points="132.2,208.3 253.0,171.9 373.8,146.4 482.6,124.6 609.4,100.9" fill="none" stroke="var(--info)" stroke-width="2.4"/>
<line x1="132.2" y1="208.3" x2="132.2" y2="252" stroke="var(--danger)" stroke-width="1" stroke-dasharray="3 3"/>
<circle cx="132.2" cy="208.3" r="4.5" fill="var(--info)"/>
<text x="138.2" y="222.3" font-size="7.2" fill="var(--danger-text)">start</text>
<circle cx="253.0" cy="171.9" r="4.5" fill="var(--info)"/>
<text x="253.0" y="155.9" text-anchor="middle" font-size="7.4" fill="var(--text-secondary)" font-weight="700">fix: calibration drift</text>
<text x="253.0" y="165.9" text-anchor="middle" font-size="6.4" fill="var(--text-muted)">re-inflates placement budget (CEC-03)</text>
<circle cx="373.8" cy="146.4" r="4.5" fill="var(--info)"/>
<text x="373.8" y="130.4" text-anchor="middle" font-size="7.4" fill="var(--text-secondary)" font-weight="700">fix: filter clogging</text>
<text x="373.8" y="140.4" text-anchor="middle" font-size="6.4" fill="var(--text-muted)">thermal (M12)</text>
<circle cx="482.6" cy="124.6" r="4.5" fill="var(--info)"/>
<text x="482.6" y="108.6" text-anchor="middle" font-size="7.4" fill="var(--text-secondary)" font-weight="700">fix: seal wear</text>
<text x="482.6" y="118.6" text-anchor="middle" font-size="6.4" fill="var(--text-muted)">fluid (M9)</text>
<circle cx="609.4" cy="100.9" r="4.5" fill="var(--info)"/>
<text x="609.4" y="84.9" text-anchor="middle" font-size="7.4" fill="var(--text-secondary)" font-weight="700">fix: fastener loosening</text>
<text x="609.4" y="94.9" text-anchor="middle" font-size="6.4" fill="var(--text-muted)">vibration</text>
<text x="277.2" y="215.6" font-size="7.6" fill="var(--info)">reliability is grown across iterations</text>
<text x="20" y="288" font-size="7.8" fill="var(--text-muted)">Durability testing (accelerated life, sustained operation, environmental) reveals wear modes day-one testing cannot. Acceptance is a</text>
<text x="20" y="300" font-size="7.8" fill="var(--text-secondary)" font-weight="700">reliability target over a representative season, not a single good day (EI: prove a season, not a day).</text>
</svg>