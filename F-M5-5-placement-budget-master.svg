<svg viewBox="0 0 760 275" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The placement error budget assembled in full: six independent sources (depth, calibration, hand-eye, sync, estimation, mechanical) combine in quadrature into the placement error, which must satisfy the three-sigma rule against the capture tolerance; because the total is set by the largest term, the depth error that grows as range squared is often dominant, which is why the mission stages the fruit close." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Placement error budget (CEC-03), dominant term highlighted</text>
<rect x="200" y="56" width="223" height="17" rx="3" fill="var(--danger)" fill-opacity="0.5" stroke="var(--danger)"/>
<text x="194" y="69" font-size="7" fill="var(--text-secondary)" text-anchor="end">depth  &#963;_Z</text>
<text x="429.2" y="69" font-size="6.8" fill="var(--danger-text)" font-weight="700">dominant (grows as Z^2)</text>
<rect x="200" y="80" width="72" height="17" rx="3" fill="var(--info)" fill-opacity="0.5" stroke="var(--info)"/>
<text x="194" y="93" font-size="7" fill="var(--text-secondary)" text-anchor="end">calibration  &#963;_cal</text>
<rect x="200" y="104" width="79" height="17" rx="3" fill="var(--info)" fill-opacity="0.5" stroke="var(--info)"/>
<text x="194" y="117" font-size="7" fill="var(--text-secondary)" text-anchor="end">hand-eye  &#963;_he</text>
<rect x="200" y="128" width="58" height="17" rx="3" fill="var(--info)" fill-opacity="0.5" stroke="var(--info)"/>
<text x="194" y="141" font-size="7" fill="var(--text-secondary)" text-anchor="end">sync  &#963;_sync</text>
<rect x="200" y="152" width="86" height="17" rx="3" fill="var(--info)" fill-opacity="0.5" stroke="var(--info)"/>
<text x="194" y="165" font-size="7" fill="var(--text-secondary)" text-anchor="end">estimation  &#963;_est</text>
<rect x="200" y="176" width="72" height="17" rx="3" fill="var(--info)" fill-opacity="0.5" stroke="var(--info)"/>
<text x="194" y="189" font-size="7" fill="var(--text-secondary)" text-anchor="end">mech  &#963;_mech</text>
<rect x="200" y="208" width="278" height="20" rx="3" fill="var(--accent)" fill-opacity="0.5" stroke="var(--accent)"/>
<text x="194" y="222" font-size="7.4" fill="var(--accent)" font-weight="700" text-anchor="end">sigma_place (RSS)</text>
<line x1="492" y1="52" x2="492" y2="232" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="5 3"/>
<text x="495.81991707215604" y="62" font-size="6.8" fill="var(--warn-text)">c/3 (need 3sigma &lt;= c)</text>
<rect x="590" y="150" width="150" height="70" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="600" y="168" font-size="8" fill="var(--accent)" font-weight="700">3 sigma_place &lt;= c</text>
<text x="600" y="184" font-size="6.4" fill="var(--text-muted)">halving the dominant</text>
<text x="600" y="193" font-size="6.4" fill="var(--text-muted)">term nearly halves total;</text>
<text x="600" y="203" font-size="6.4" fill="var(--text-muted)">halving a 1/3 term:</text>
<text x="600" y="213" font-size="6.4" fill="var(--text-muted)">~2% (EI-05)</text>
<text x="20" y="250" font-size="7.8" fill="var(--text-muted)">sigma_place = sqrt(sigma_Z^2 + sigma_cal^2 + sigma_he^2 + sigma_sync^2 + sigma_est^2 + sigma_mech^2). The machine's central accuracy contract, allocated</text>
<text x="20" y="262" font-size="7.8" fill="var(--text-muted)">to each subsystem as a requirement. Attack the dominant source first; stage the fruit close because depth error dominates. Illustrative terms. Sections 6.7 and 7.4.</text>
</svg>