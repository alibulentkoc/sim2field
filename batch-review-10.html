<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>Batch review: 10 new figures</title><style>
:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--text-on-accent:#0e120d;--accent:#9bcf3b;--accent-strong:#6f9a2c;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4;--accent-2:#b98bd9}*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem 2.2rem 4rem}
h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:1.4rem;margin:0 0 .3rem}
.lead{color:var(--text-muted);font-size:.82rem;max-width:80ch;line-height:1.5;margin:.2rem 0 1.4rem}
.grid{display:grid;grid-template-columns:1fr;gap:1.1rem;max-width:900px}
.card{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--surface)}
figcaption{padding:.55rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.fid{font-size:.62rem;font-weight:700;color:var(--accent);border:1px solid var(--accent-strong);border-radius:5px;padding:.05rem .4rem}
.sec{font-size:.6rem;color:var(--text-muted);border:1px solid var(--border-strong);border-radius:5px;padding:.05rem .4rem}
.ttl{font-size:.8rem;color:var(--text-secondary)}
.body{padding:.8rem;background:var(--surface-3);overflow-x:auto}.body svg{display:block;width:100%;height:auto;min-width:660px}
</style></head><body>
<h1>Batch review: 10 new figures</h1>
<p class="lead">Ten buildable-backlog figures across Modules 5, 6, 7, 8, 11, 13, 15, and 16. Each is bound to its module, rendered in both editions, and passes the drift and typography guards. Illustrative values are labeled on each figure.</p>
<div class="grid"><figure class="card"><figcaption><span class="fid">F-M7-1</span><span class="sec">Section 6</span><span class="ttl">Two decision layers</span></figcaption><div class="body"><svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two decision layers: a discrete auditable task layer (the mission FSM choosing which fruit and whether to attempt) sits above a continuous, possibly learned action layer (the grasp policy choosing how to grasp), separated so the sequencing logic can be verified independently of the opaque policy." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Two decision layers in Decide</text>
<rect x="40" y="48" width="680" height="66" rx="9" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<text x="56" y="68" font-size="10" fill="var(--info)" font-weight="700">TASK LAYER  (mission FSM)</text>
<text x="56" y="84" font-size="7.6" fill="var(--text-secondary)">which fruit, what order, whether to attempt</text>
<text x="56" y="98" font-size="7.4" fill="var(--text-muted)">discrete, auditable logic - verifiable</text>
<rect x="540" y="58" width="168" height="46" rx="6" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.5"/>
<text x="624" y="76" font-size="7" fill="var(--info)" font-weight="anc=middle">rate: event / low</text>
<text x="624" y="90" font-size="7" fill="var(--info)" font-weight="anc=middle">verifiable: yes</text>
<line x1="380" y1="114" x2="380" y2="140" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#a)"/>
<text x="388" y="131" font-size="7.2" fill="var(--text-muted)">chosen fruit -> attempt</text>
<rect x="40" y="142" width="680" height="66" rx="9" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.5"/>
<text x="56" y="162" font-size="10" fill="var(--accent-2)" font-weight="700">ACTION LAYER  (grasp policy)</text>
<text x="56" y="178" font-size="7.6" fill="var(--text-secondary)">how to grasp a chosen fruit (approach, contact, force)</text>
<text x="56" y="192" font-size="7.4" fill="var(--text-muted)">continuous, possibly learned policy - opaque</text>
<rect x="540" y="152" width="168" height="46" rx="6" fill="var(--surface-2)" stroke="var(--accent-2)" stroke-opacity="0.5"/>
<text x="624" y="170" font-size="7" fill="var(--accent-2)" font-weight="anc=middle">rate: continuous</text>
<text x="624" y="184" font-size="7" fill="var(--accent-2)" font-weight="anc=middle">verifiable: hard</text>
<text x="20" y="232" font-size="8" fill="var(--text-muted)">Separated by rate and verifiability: keeping them distinct lets the machine verify the sequencing logic independently of the opaque grasp policy. Section 6.1.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M7-3</span><span class="sec">Section 6</span><span class="ttl">The grasp as a Markov decision process</span></figcaption><div class="body"><svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The grasp as a Markov decision process: a state (fruit pose and covariance, mask, ripeness, gripper) feeds a policy that chooses an action (approach, contact, force and compliance targets); the environment returns a reward that adds success inside the grip-force window and subtracts slip, bruise, and miss, tying the objective to the physical window rather than a proxy." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The grasp as a Markov decision process</text>
<rect x="40" y="60" width="150" height="74" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="115" y="78" font-size="9" fill="var(--info)" font-weight="700" text-anchor="middle">STATE s</text>
<text x="115" y="92" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">fruit pose + covariance</text>
<text x="115" y="103" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">mask / shape, ripeness</text>
<text x="115" y="114" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">gripper state</text>
<rect x="300" y="60" width="150" height="74" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="375" y="78" font-size="9" fill="var(--accent-2)" font-weight="700" text-anchor="middle">POLICY &#960;</text>
<text x="375" y="94" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">&#960;(a|s): s -> a</text>
<text x="375" y="108" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">maximizes E[G],</text>
<text x="375" y="119" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">G = sum &#947;^t R_t</text>
<rect x="560" y="60" width="160" height="74" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="640" y="78" font-size="9" fill="var(--accent)" font-weight="700" text-anchor="middle">ACTION a</text>
<text x="640" y="94" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">approach direction</text>
<text x="640" y="105" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">contact placement</text>
<text x="640" y="116" font-size="6.6" fill="var(--text-muted)" font-weight="anc=middle">force / compliance</text>
<line x1="190" y1="97" x2="298" y2="97" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="450" y1="97" x2="558" y2="97" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="300" y="176" width="160" height="30" rx="7" fill="var(--surface-2)" stroke="var(--warn)" stroke-opacity="0.6"/>
<text x="380" y="195" font-size="8" fill="var(--warn-text)" font-weight="700" text-anchor="middle">ENVIRONMENT / twin</text>
<path d="M 640,134 L 640,191 L 462,191" fill="none" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<path d="M 298,191 L 115,191 L 115,136" fill="none" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<text x="500" y="187" font-size="7" fill="var(--text-muted)">reward R(s,a) + next state</text>
<rect x="40" y="222" width="680" height="52" rx="8" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.5"/>
<text x="52" y="240" font-size="8.4" fill="var(--accent)" font-weight="700">R = +R_success . 1[grasp inside the Grip-Force Window (CEC-02)]</text>
<text x="52" y="254" font-size="8" fill="var(--text-secondary)">    - &#955;_slip 1[slip]  - &#955;_bruise 1[bruise]  - &#955;_miss 1[miss]</text>
<text x="52" y="268" font-size="7" fill="var(--text-muted)">The reward is tied explicitly to the physical window, not a proxy, so the policy cannot be reward-hacked. Sections 6.3 and 7.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M6-1</span><span class="sec">Section 6</span><span class="ttl">The no-cloud boundary: runtime vs development</span></figcaption><div class="body"><svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The no-cloud boundary partitions every capability into a runtime side that closes entirely on-robot with no network dependency (detection, localization, decision, grasp control, safety) and a development side done off-robot (training, synthetic data, calibration, analysis, compilation, updates) whose results are delivered as artifacts; no runtime path may depend on an off-robot resource." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The no-cloud boundary: runtime vs development (CEC-04)</text>
<rect x="30" y="46" width="330" height="196" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="46" y="66" font-size="9.5" fill="var(--accent)" font-weight="700">RUNTIME  (on-robot, in the loop)</text>
<text x="46" y="79" font-size="7" fill="var(--text-muted)">closes entirely on-robot, no network dependency</text>
<rect x="46" y="98" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="112" font-size="7.6" fill="var(--text-secondary)">detection (M4)</text>
<rect x="46" y="124" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="138" font-size="7.6" fill="var(--text-secondary)">localization + fusion (M5)</text>
<rect x="46" y="150" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="164" font-size="7.6" fill="var(--text-secondary)">decision / task FSM (M7)</text>
<rect x="46" y="176" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="190" font-size="7.6" fill="var(--text-secondary)">grasp control (M9)</text>
<rect x="46" y="202" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="54" y="216" font-size="7.6" fill="var(--text-secondary)">safety monitor (M11/M15)</text>
<rect x="400" y="46" width="330" height="196" rx="10" fill="var(--surface)" stroke="var(--info)" stroke-width="1.6"/>
<text x="416" y="66" font-size="9.5" fill="var(--info)" font-weight="700">DEVELOPMENT  (off-robot)</text>
<text x="416" y="79" font-size="7" fill="var(--text-muted)">done at development time, delivered as artifacts</text>
<rect x="416" y="98" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="424" y="112" font-size="7.6" fill="var(--text-secondary)">training + synthetic data (M4/M7)</text>
<rect x="416" y="124" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="424" y="138" font-size="7.6" fill="var(--text-secondary)">calibration computation (M3)</text>
<rect x="416" y="150" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="424" y="164" font-size="7.6" fill="var(--text-secondary)">heavy analysis / evaluation</text>
<rect x="416" y="176" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="424" y="190" font-size="7.6" fill="var(--text-secondary)">model compilation</text>
<rect x="416" y="202" width="298" height="20" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="424" y="216" font-size="7.6" fill="var(--text-secondary)">over-the-air updates</text>
<line x1="380" y1="52" x2="380" y2="236" stroke="var(--danger)" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="416" y1="230" x2="360" y2="230" stroke="var(--info)" stroke-width="1.6" marker-end="url(#a)"/>
<text x="388" y="226" font-size="6.6" fill="var(--info)">artifacts (models, calib, updates) - one way</text>
<rect x="30" y="252" width="700" height="34" rx="8" fill="var(--surface-2)" stroke="var(--danger)" stroke-opacity="0.55"/>
<text x="44" y="266" font-size="8.4" fill="var(--danger-text)" font-weight="700">The rule: no runtime path may depend on an off-robot resource.</text>
<text x="44" y="279" font-size="7.4" fill="var(--text-muted)">A design tool: classify each capability and audit the architecture for hidden cloud dependencies. Section 6.2.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M11-5</span><span class="sec">Section 6</span><span class="ttl">The independent safety monitor</span></figcaption><div class="body"><svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The independent safety monitor watches the guards the prior modules produce (grip force vs window, manipulability, stability, heartbeats) and can command a safe stop, release, or halt regardless of what the behavior node or grasp policy commands, because it has its own inputs, its own simple verified logic, and its own execution context, so a failure in what it guards cannot disable it." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The independent safety monitor</text>
<rect x="30" y="52" width="150" height="30" rx="6" fill="var(--surface)" stroke="var(--info)" stroke-opacity="0.6"/>
<text x="105" y="71" font-size="7.8" fill="var(--info)" font-weight="700" text-anchor="middle">task FSM (M7)</text>
<rect x="30" y="92" width="150" height="30" rx="6" fill="var(--surface)" stroke="var(--accent-2)" stroke-opacity="0.6"/>
<text x="105" y="111" font-size="7.8" fill="var(--accent-2)" font-weight="700" text-anchor="middle">grasp policy (M7/M9)</text>
<rect x="250" y="66" width="120" height="44" rx="7" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.4"/>
<text x="310" y="86" font-size="8" fill="var(--warn-text)" font-weight="700" text-anchor="middle">command</text>
<text x="310" y="99" font-size="8" fill="var(--warn-text)" font-weight="700" text-anchor="middle">arbitration</text>
<line x1="180" y1="67" x2="248" y2="80" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<line x1="180" y1="107" x2="248" y2="96" stroke="var(--border-strong)" stroke-width="1.2" marker-end="url(#a)"/>
<rect x="440" y="66" width="120" height="44" rx="7" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="500" y="92" font-size="8.4" fill="var(--accent)" font-weight="700" text-anchor="middle">actuators</text>
<line x1="370" y1="88" x2="438" y2="88" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<rect x="250" y="150" width="310" height="86" rx="9" fill="var(--danger)" fill-opacity="0.07" stroke="var(--danger)" stroke-width="1.8"/>
<text x="405" y="170" font-size="9.5" fill="var(--danger-text)" font-weight="700" text-anchor="middle">INDEPENDENT SAFETY MONITOR</text>
<text x="405" y="184" font-size="6.8" fill="var(--text-muted)" font-weight="anc=middle">own inputs - own simple verified logic - own execution context</text>
<text x="266" y="202" font-size="7" fill="var(--text-secondary)">watches guards: grip force vs window (M9), &#956;/&#947; (M8),</text>
<text x="266" y="213" font-size="7" fill="var(--text-secondary)">stability margin (M10), heartbeat/watchdog of every node</text>
<text x="266" y="227" font-size="7.2" fill="var(--danger-text)" font-weight="700">can OVERRIDE: safe-stop / safe-release / bounded halt</text>
<line x1="405" y1="150" x2="405" y2="112" stroke="var(--danger)" stroke-width="1.8" stroke-dasharray="4 2" marker-end="url(#a)"/>
<text x="412" y="132" font-size="6.8" fill="var(--danger-text)">overrides, regardless of any node</text>
<line x1="500" y1="110" x2="500" y2="150" stroke="var(--danger)" stroke-width="1" stroke-dasharray="2 2"/>
<text x="20" y="262" font-size="8" fill="var(--text-muted)">Independence is what turns a pile of guards into a safety function: the monitor does not depend on the correctness of the mission logic,</text>
<text x="20" y="274" font-size="8" fill="var(--text-muted)">the learned policy, or the perception it guards, so a failure in the system it protects cannot disable it (EI-11). Section 6.6.</text>
<text x="20" y="288" font-size="7.4" fill="var(--text-muted)">Physical bounds (relief M9/EI-09, singularity-free workspace M8) act even faster, at physics speed: defense in depth.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M11-6</span><span class="sec">Section 6</span><span class="ttl">Fail-safe / fail-operational state machine</span></figcaption><div class="body"><svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A fail-safe and fail-operational state machine: from normal operation a recoverable fault degrades to reduced operation (fail-operational) while an unrecoverable fault or the safety monitor forces a safe stop (fail-safe); the safe state is reachable from every state and the reaction path must complete before harm occurs." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Fail-safe / fail-operational state machine</text>
<rect x="60" y="70" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="150.0" y="90" font-size="9" fill="var(--accent)" font-weight="700" text-anchor="middle">NORMAL</text>
<text x="150.0" y="104" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">full mission capability</text>
<rect x="300" y="70" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--warn)" stroke-width="1.6"/>
<text x="390.0" y="90" font-size="9" fill="var(--warn)" font-weight="700" text-anchor="middle">DEGRADED</text>
<text x="390.0" y="104" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">fail-operational: reduced</text>
<rect x="540" y="150" width="180" height="50" rx="10" fill="var(--surface)" stroke="var(--danger)" stroke-width="1.6"/>
<text x="630.0" y="170" font-size="9" fill="var(--danger)" font-weight="700" text-anchor="middle">SAFE STOP</text>
<text x="630.0" y="184" font-size="6.8" fill="var(--text-muted)" text-anchor="middle">fail-safe: bounded halt</text>
<line x1="240" y1="88" x2="298" y2="88" stroke="var(--border-strong)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="269" y="82" font-size="6.6" fill="var(--warn-text)" font-weight="anc=middle">recoverable</text>
<text x="269" y="98" font-size="6.6" fill="var(--warn-text)" font-weight="anc=middle">fault</text>
<line x1="300" y1="108" x2="240" y2="108" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#a)"/>
<text x="269" y="120" font-size="6.4" fill="var(--text-muted)" font-weight="anc=middle">recover</text>
<path d="M 180,120 Q 360,200 538,175" fill="none" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="420" y1="120" x2="540" y2="160" stroke="var(--danger)" stroke-width="1.4" marker-end="url(#a)"/>
<text x="300" y="205" font-size="6.8" fill="var(--danger-text)" font-weight="anc=middle">unrecoverable fault OR safety-monitor command (from any state)</text>
<rect x="60" y="150" width="420" height="52" rx="8" fill="var(--surface-2)" stroke="var(--danger)" stroke-opacity="0.5"/>
<text x="72" y="168" font-size="8" fill="var(--text-secondary)" font-weight="700">The safe state is reachable from EVERY state (the monitor's last resort).</text>
<text x="72" y="182" font-size="7.4" fill="var(--text-muted)">Reaction must beat harm:  L_detect + L_react  &lt;=  T_harm  (M11 Sec 7.4).</text>
<text x="72" y="195" font-size="7.4" fill="var(--text-muted)">Physical bounds (relief, compliance) act at physics speed and buy margin.</text>
<text x="20" y="232" font-size="8" fill="var(--text-muted)">Fail-operational keeps the mission going through recoverable faults; fail-safe halts safely when it cannot. Sections 6.6 and 7.4.</text>
<text x="20" y="246" font-size="7.4" fill="var(--text-muted)">A rare late cycle is a real failure: guarantee the worst case, not the average.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M15-5</span><span class="sec">Section 7</span><span class="ttl">Reaction-time margin: physics vs software speed</span></figcaption><div class="body"><svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The safety reaction-time margin: after a hazard begins, the software path must detect and react before the time-to-harm deadline, while the physical bounds (relief and compliance) act almost immediately at physics speed, buying margin that software alone cannot guarantee." font-family="'IBM Plex Mono',monospace">

<text x="46" y="220" font-size="7" fill="var(--text-secondary)">supervision labor</text>
<text x="46" y="237" font-size="6.6" fill="var(--text-muted)">(recurring, per season)</text>
<rect x="300" y="96" width="200" height="120" rx="9" fill="var(--surface-2)" stroke="var(--accent)" stroke-width="1.8"/>
<text x="400" y="120" font-size="10" fill="var(--accent)" font-weight="700" text-anchor="middle">TCO / season</text>

<text x="400" y="152" font-size="7" fill="var(--text-secondary)" font-weight="anc=middle">+ operating cost</text>
<text x="400" y="172" font-size="7" fill="var(--text-muted)" font-weight="anc=middle">= true per-season cost</text>

<text x="20" y="272" font-size="7.8" fill="var(--text-muted)">Total cost of ownership amortizes build over the machine's life and adds operating cost, giving the true per-season cost that unit economics divide by coverage. Section 6.1.</text>
</svg></div></figure><figure class="card"><figcaption><span class="fid">F-M13-3</span><span class="sec">Section 6</span><span class="ttl">The simulation-first fidelity ladder</span></figcaption><div class="body"><svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The simulation-first fidelity ladder: rungs from cheap and approximate (kinematic geometry) up through dynamic, contact and fluid, sensor-in-the-loop, and hardware-in-the-loop to expensive and faithful prototype and field; match fidelity to the decision, find where fidelity is binding, and validate each rung against reality before trusting it." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The simulation-first fidelity ladder (CEC-06)</text>
<rect x="60" y="250" width="360" height="24" rx="5" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)" stroke-width="1"/>
<text x="68" y="266" font-size="8" fill="var(--text-secondary)" font-weight="700">kinematic</text>
<text x="188" y="266" font-size="6.6" fill="var(--text-muted)">geometry / reach</text>
<rect x="82" y="218" width="360" height="24" rx="5" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)" stroke-width="1"/>
<text x="90" y="234" font-size="8" fill="var(--text-secondary)" font-weight="700">dynamic</text>
<text x="210" y="234" font-size="6.6" fill="var(--text-muted)">masses, forces, stability</text>
<rect x="104" y="186" width="360" height="24" rx="5" fill="var(--accent-2)" fill-opacity="0.22" stroke="var(--accent-2)" stroke-width="1.6"/>
<text x="112" y="202" font-size="8" fill="var(--accent-2)" font-weight="700">contact / fluid</text>
<text x="232" y="202" font-size="6.6" fill="var(--text-muted)">grasp contact, bruise/slip, fluid (CR-03 rung)</text>
<rect x="126" y="154" width="360" height="24" rx="5" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)" stroke-width="1"/>
<text x="134" y="170" font-size="8" fill="var(--text-secondary)" font-weight="700">sensor-in-the-loop</text>
<text x="254" y="170" font-size="6.6" fill="var(--text-muted)">real perception on rendered / played-back data</text>
<rect x="148" y="122" width="360" height="24" rx="5" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)" stroke-width="1"/>
<text x="156" y="138" font-size="8" fill="var(--text-secondary)" font-weight="700">hardware-in-the-loop</text>

<rect x="170" y="90" width="360" height="24" rx="5" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)" stroke-width="1"/>

<rect x="470" y="56" width="272" height="150" rx="9" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="484" y="76" font-size="8.6" fill="var(--text-primary)" font-weight="700">The discipline (three parts):</text>
<text x="484" y="96" font-size="7.4" fill="var(--accent)" font-weight="700">1. Match fidelity to the decision.</text>
<text x="484" y="107" font-size="6.8" fill="var(--text-muted)">reach needs kinematic; will-not-bruise</text>
<text x="484" y="117" font-size="6.8" fill="var(--text-muted)">needs contact/fluid. Over/under-trust wastes.</text>
<text x="484" y="136" font-size="7.4" fill="var(--warn-text)" font-weight="700">2. Find where fidelity is binding.</text>
<text x="484" y="147" font-size="6.8" fill="var(--text-muted)">the decisions whose outcome changes across</text>
<text x="484" y="157" font-size="6.8" fill="var(--text-muted)">levels: put investment and validation there.</text>
<text x="484" y="176" font-size="7.4" fill="var(--danger-text)" font-weight="700">3. Validate each rung vs reality.</text>
<text x="484" y="187" font-size="6.8" fill="var(--text-muted)">every level has a reality gap; a rung is</text>
