<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M11-1 preview - ROS 2 node graph</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--info:#6fb0d9;--warn:#e0a03b;--danger:#f0556a;--danger-text:#f697a4;--accent-2:#b98bd9}

.figure{max-width:880px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}

<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 780 412" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The harvester as a ROS 2 node and topic graph: a best-effort perception plane feeds a real-time control plane over fixed message interfaces, and an independent safety monitor subscribes across both planes and can override the actuators." font-family="'IBM Plex Mono',monospace">

<text x="256.0" y="176" text-anchor="middle" font-size="9" fill="var(--text-primary)" font-weight="700">Grasp policy (M7)</text>

<text x="497" y="176" text-anchor="middle" font-size="7" fill="var(--text-muted)">/bounded_cmd</text>
<line x1="636" y1="182" x2="666" y2="182" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#e)"/>

<text x="100.0" y="248" text-anchor="middle" font-size="9" fill="var(--text-primary)" font-weight="700">Nav+drive (M10)</text>

<rect x="40" y="322" width="714" height="72" rx="9" fill="var(--danger)" fill-opacity="0.06" stroke="var(--danger)" stroke-width="1.5"/>
<text x="52" y="342" font-size="10.5" fill="var(--danger-text)" font-weight="700">INDEPENDENT SAFETY MONITOR (M11)</text>
<text x="52" y="357" font-size="7.8" fill="var(--text-muted)">subscribes across both planes; on a violation, commands a safe state independent of the autonomy stack (EI-11, defense in depth)</text>
<line x1="100" y1="322" x2="100" y2="206" stroke="var(--border-strong)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#sub)"/>
<line x1="258" y1="322" x2="258" y2="206" stroke="var(--border-strong)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#sub)"/>

<text x="706" y="300" font-size="7.5" fill="var(--danger-text)">/override</text>
<text x="706" y="311" font-size="7" fill="var(--text-muted)">e-stop / safe-state</text>
<text x="16" y="408" font-size="8" fill="var(--text-secondary)">Message types are the interfaces prior modules fixed (pose-with-covariance, bounded grasp proposal); this module composes them. Plane separation (DD-33) keeps a slow network from delaying the force loop.</text>
</svg></div><figcaption><span class="fid">F-M11-1</span>The harvester as a ROS 2 node and topic graph. A best-effort perception plane feeds a real-time control plane over the fixed message interfaces the earlier modules set, and an independent safety monitor subscribes across both planes and can override the actuators. Plane separation keeps a slow network from delaying the force loop. Module 11, Sections 6.1 and 6.3.</figcaption></figure></body></html>
