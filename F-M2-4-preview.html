<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M2-4 preview - Grip-force window</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--danger:#f0556a;--danger-text:#f697a4}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem}
.figure{max-width:860px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto} .figbody svg{display:block;width:100%;height:auto;min-width:620px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)} .fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}</style></head>
<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The grip-force window: a feasible grasp exists only between the anti-slip lower bound and the anti-bruise upper bound; when slip exceeds bruise the window is empty and no grasp force succeeds." font-family="'IBM Plex Mono',monospace">
<defs><marker id="up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,10 L5,0 L10,10 z" fill="var(--accent)"/></marker><marker id="dn" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L5,10 L10,0 z" fill="var(--info)"/></marker></defs>
<line x1="60" y1="50" x2="60" y2="346" stroke="var(--border-strong)" stroke-width="1.5"/>
<path d="M56,56 L60,49 L64,56 z" fill="var(--border-strong)"/>
<text x="50" y="60" text-anchor="end" font-size="9" fill="var(--text-muted)" transform="rotate(-90 50 96)">F<tspan dy="3" font-size="68%">grip</tspan><tspan dy="-3"> </tspan>(force)</text>
<text x="196.0" y="40" text-anchor="middle" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">feasible window</text>
<rect x="60" y="56" width="272" height="94" fill="var(--danger)" fill-opacity="0.10"/>
<rect x="60" y="150" width="272" height="120" fill="var(--accent)" fill-opacity="0.16"/>
<rect x="60" y="270" width="272" height="76" fill="var(--danger)" fill-opacity="0.10"/>
<text x="196.0" y="107.0" text-anchor="middle" font-size="11" fill="var(--danger-text)" font-weight="700">BRUISE</text>
<text x="196.0" y="121.0" text-anchor="middle" font-size="8" fill="var(--text-muted)">fruit damaged</text>
<text x="196.0" y="210.0" text-anchor="middle" font-size="12" fill="var(--accent)" font-weight="700">WINDOW</text>
<text x="196.0" y="225.0" text-anchor="middle" font-size="8.5" fill="var(--text-secondary)">feasible grasp</text>
<text x="196.0" y="308.0" text-anchor="middle" font-size="11" fill="var(--danger-text)" font-weight="700">SLIP</text>
<text x="196.0" y="322.0" text-anchor="middle" font-size="8" fill="var(--text-muted)">fruit not held</text>
<line x1="60" y1="150" x2="332" y2="150" stroke="var(--danger)" stroke-width="1.6" stroke-dasharray="6 3"/>
<line x1="60" y1="270" x2="332" y2="270" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="6 3"/>
<text x="336" y="153" font-size="9.5" fill="var(--danger-text)" font-weight="700">F<tspan dy="3" font-size="68%">bruise</tspan><tspan dy="-3"> </tspan></text>
<text x="336" y="167" font-size="8" fill="var(--text-muted)">~ (E*)^-2 : raise by compliance</text>
<text x="336" y="273" font-size="9.5" fill="var(--warn-text)" font-weight="700">F<tspan dy="3" font-size="68%">slip</tspan><tspan dy="-3"> </tspan></text>
<text x="336" y="287" font-size="8" fill="var(--text-muted)">m(g+a_dyn)/2mu : lower by friction</text>
<line x1="196" y1="150" x2="196" y2="120" stroke="var(--accent)" stroke-width="1.4" marker-end="url(#up)"/>
<text x="202" y="128" font-size="8" fill="var(--accent)">compliance</text>
<line x1="196" y1="270" x2="196" y2="300" stroke="var(--info)" stroke-width="1.4" marker-end="url(#dn)"/>
<text x="202" y="298" font-size="8" fill="var(--info)">friction / gentler motion</text>
<line x1="430" y1="50" x2="430" y2="346" stroke="var(--border-strong)" stroke-width="1.5"/>
<path d="M426,56 L430,49 L434,56 z" fill="var(--border-strong)"/>
<text x="420" y="60" text-anchor="end" font-size="9" fill="var(--text-muted)" transform="rotate(-90 420 96)">F<tspan dy="3" font-size="68%">grip</tspan><tspan dy="-3"> </tspan>(force)</text>
<text x="566.0" y="40" text-anchor="middle" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">empty window (slip &gt; bruise)</text>
<rect x="430" y="56" width="272" height="114" fill="var(--danger)" fill-opacity="0.10"/>
<rect x="430" y="170" width="272" height="80" fill="var(--danger)" fill-opacity="0.26"/>
<rect x="430" y="250" width="272" height="96" fill="var(--danger)" fill-opacity="0.10"/>
<text x="566.0" y="117.0" text-anchor="middle" font-size="9.5" fill="var(--danger-text)" font-weight="700">holds, but BRUISES</text>
<text x="566.0" y="210.0" text-anchor="middle" font-size="10" fill="var(--danger-text)" font-weight="700">EMPTY WINDOW</text>
<text x="566.0" y="224.0" text-anchor="middle" font-size="8" fill="var(--text-muted)">no force succeeds</text>
<text x="566.0" y="302.0" text-anchor="middle" font-size="9.5" fill="var(--danger-text)" font-weight="700">SLIPS</text>
<line x1="430" y1="250" x2="702" y2="250" stroke="var(--danger)" stroke-width="1.6" stroke-dasharray="6 3"/>
<line x1="430" y1="170" x2="702" y2="170" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="6 3"/>
<text x="706" y="173" font-size="9.5" fill="var(--warn-text)" font-weight="700">F<tspan dy="3" font-size="68%">slip</tspan><tspan dy="-3"> </tspan></text>
<text x="706" y="253" font-size="9.5" fill="var(--danger-text)" font-weight="700">F<tspan dy="3" font-size="68%">bruise</tspan><tspan dy="-3"> </tspan></text>
</svg></div><figcaption><span class="fid">F-M2-4</span>The grip-force window (CEC-02). A grasp succeeds only between the anti-slip lower bound and the anti-bruise upper bound. Compliance raises the bruise bound; friction and gentler motion lower the slip bound; both widen the window. When slip exceeds bruise the window is empty and no grasp force succeeds. Module 2, Section 7.4.</figcaption></figure></body></html>
