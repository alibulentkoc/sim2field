<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M14-4 preview - FMEA Pareto</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--accent-strong:#6f9a2c;--danger:#f0556a;--danger-text:#f697a4}

<line x1="92" y1="300" x2="470" y2="300" stroke="var(--border-strong)" stroke-width="1.5"/>
