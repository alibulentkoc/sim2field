<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M12-2 preview - Battery sizing</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--accent-strong:#6f9a2c;--info:#6fb0d9;--warn:#e0a03b}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem}
.figure{max-width:840px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto} .figbody svg{display:block;width:100%;height:auto;min-width:680px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)} .fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}</style></head>
<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Battery sizing as a derating waterfall: the usable energy the shift requires is inflated by the depth-of-discharge limit, the temperature derate, and voltage sag, plus a design margin, to give the installed capacity that must actually be built." font-family="'IBM Plex Mono',monospace">
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Battery sizing: from required energy to installed capacity</text>
<line x1="70" y1="68" x2="70" y2="250" stroke="var(--border-strong)" stroke-width="1.4"/>
<line x1="70" y1="250" x2="720" y2="250" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="62" y="161.0" text-anchor="middle" font-size="8" fill="var(--text-muted)" transform="rotate(-90 62 161.0)">energy (normalized to E_req)</text>
<rect x="96" y="156.3" width="76" height="93.7" rx="2" fill="var(--accent)" fill-opacity="0.6" stroke="var(--accent)"/>
<text x="134.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">E_req</text>
<text x="134.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">P_bar x t_shift</text>
<text x="134.0" y="152.3" text-anchor="middle" font-size="6.8" fill="var(--accent)">1.00</text>
<rect x="204" y="132.9" width="76" height="23.4" rx="2" fill="var(--warn)" fill-opacity="0.6" stroke="var(--warn)"/>
<text x="242.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">/ DoD</text>
<text x="242.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">depth-of-discharge limit (0.80)</text>
<text x="242.0" y="128.9" text-anchor="middle" font-size="6.8" fill="var(--warn)">1.25</text>
<line x1="172" y1="156.3" x2="204" y2="156.3" stroke="var(--text-muted)" stroke-width="0.8" stroke-dasharray="3 2"/>
<rect x="312" y="119.9" width="76" height="13.0" rx="2" fill="var(--warn)" fill-opacity="0.6" stroke="var(--warn)"/>
<text x="350.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">/ f_temp</text>
<text x="350.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">temperature derate (0.90)</text>
<text x="350.0" y="115.9" text-anchor="middle" font-size="6.8" fill="var(--warn)">1.39</text>
<line x1="280" y1="132.9" x2="312" y2="132.9" stroke="var(--text-muted)" stroke-width="0.8" stroke-dasharray="3 2"/>
<rect x="420" y="113.0" width="76" height="6.8" rx="2" fill="var(--warn)" fill-opacity="0.6" stroke="var(--warn)"/>
<text x="458.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">/ f_sag</text>
<text x="458.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">sag under high C-rate (0.95)</text>
<text x="458.0" y="109.0" text-anchor="middle" font-size="6.8" fill="var(--warn)">1.46</text>
<line x1="388" y1="119.9" x2="420" y2="119.9" stroke="var(--text-muted)" stroke-width="0.8" stroke-dasharray="3 2"/>
<rect x="528" y="92.5" width="76" height="20.5" rx="2" fill="var(--info)" fill-opacity="0.6" stroke="var(--info)"/>
<text x="566.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">+ margin</text>
<text x="566.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">design margin (15%)</text>
<text x="566.0" y="88.5" text-anchor="middle" font-size="6.8" fill="var(--info)">1.68</text>
<line x1="496" y1="113.0" x2="528" y2="113.0" stroke="var(--text-muted)" stroke-width="0.8" stroke-dasharray="3 2"/>
<rect x="636" y="92.5" width="76" height="157.5" rx="2" fill="var(--accent-strong)" fill-opacity="0.6" stroke="var(--accent-strong)"/>
<text x="674.0" y="263" text-anchor="middle" font-size="7.6" fill="var(--text-secondary)" font-weight="700">E_install</text>
<text x="674.0" y="274" text-anchor="middle" font-size="6.2" fill="var(--text-muted)">installed capacity</text>
<text x="674.0" y="88.5" text-anchor="middle" font-size="6.8" fill="var(--accent-strong)">1.68</text>
<rect x="70" y="262" width="650" height="30" rx="7" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="82" y="274" font-size="7.8" fill="var(--text-secondary)">E_install = E_req / (DoD x f_temp x f_sag), with margin.  Each factor &lt; 1 inflates what must be built.</text>
<text x="82" y="286" font-size="7.4" fill="var(--text-muted)">Cold reduces capacity; heat reduces life. Endurance and coverage (M10/M16) follow. Amiga platform battery bounds availability [VERIFY@PUB].</text>
</svg></div><figcaption><span class="fid">F-M12-2</span>Battery sizing with derating. The usable energy the shift requires is inflated by the depth-of-discharge limit, the temperature derate, and voltage sag, plus a design margin, to give the installed capacity that must actually be built (here about 1.7x the required energy). Third Module 12 figure. Illustrative factors. Module 12, Section 6.3.</figcaption></figure></body></html>
