<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="color-scheme" content="dark"><title>F-M3-1 preview - Sensing chain</title><style>:root{--bg:#0e120d;--surface:#161c14;--surface-2:#0b0e0a;--surface-3:#12160f;--border:#2b3527;--border-strong:#3a4633;--text-primary:#eef2e6;--text-secondary:#c8cfbe;--text-muted:#adb4a2;--accent:#9bcf3b;--info:#6fb0d9;--warn:#e0a03b;--warn-text:#eed9b4;--accent-2:#b98bd9}
body{margin:0;background:var(--bg);color:var(--text-primary);font-family:'IBM Plex Mono',ui-monospace,monospace;padding:2rem}
.figure{max-width:840px;margin:0 auto;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
.figbody{padding:1rem 1.1rem;background:var(--surface-3);overflow-x:auto} .figbody svg{display:block;width:100%;height:auto;min-width:680px}
figcaption{padding:.7rem 1rem;font-size:.82rem;color:var(--text-muted);border-top:1px solid var(--border)} .fid{font-size:.64rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-right:.5rem}</style></head>
<body><figure class="figure"><div class="figbody"><svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The sensing chain converts a physical property through a transduction mechanism into a signal from which information is extracted, with every link degrading the signal; each sensor is characterized by a fixed vocabulary (resolution, accuracy vs precision, noise and SNR, dynamic range, bandwidth and latency, field of view and range, field robustness) that propagates into the system budgets." font-family="'IBM Plex Mono',monospace">
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">The sensing chain: property to information</text>
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<rect x="28" y="52" width="150" height="46" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.4"/>
<text x="103.0" y="70" text-anchor="middle" font-size="8.6" fill="var(--accent-2)" font-weight="700">PHYSICAL</text>
<text x="103.0" y="82" text-anchor="middle" font-size="8.6" fill="var(--accent-2)" font-weight="700">PROPERTY</text>
<text x="103.0" y="93" text-anchor="middle" font-size="6.6" fill="var(--text-muted)">light / sound / force</text>
<rect x="200" y="52" width="150" height="46" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="275.0" y="76" text-anchor="middle" font-size="8.6" fill="var(--info)" font-weight="700">TRANSDUCTION</text>
<text x="275.0" y="93" text-anchor="middle" font-size="6.6" fill="var(--text-muted)">sensor mechanism</text>
<rect x="372" y="52" width="150" height="46" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.4"/>
<text x="447.0" y="76" text-anchor="middle" font-size="8.6" fill="var(--info)" font-weight="700">SIGNAL</text>
<text x="447.0" y="93" text-anchor="middle" font-size="6.6" fill="var(--text-muted)">voltage / pixels</text>
<rect x="544" y="52" width="150" height="46" rx="8" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.4"/>
<text x="619.0" y="76" text-anchor="middle" font-size="8.6" fill="var(--accent)" font-weight="700">INFORMATION</text>
<text x="619.0" y="93" text-anchor="middle" font-size="6.6" fill="var(--text-muted)">fruit pose, ripeness</text>
<line x1="178" y1="75" x2="200" y2="75" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="350" y1="75" x2="372" y2="75" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="522" y1="75" x2="544" y2="75" stroke="var(--border-strong)" stroke-width="1.5" marker-end="url(#a)"/>
<text x="189" y="114" font-size="7.4" fill="var(--warn-text)">transduce</text>
<text x="361" y="114" text-anchor="middle" font-size="7.4" fill="var(--text-muted)">extract</text>
<text x="20" y="128" font-size="8" fill="var(--warn-text)" font-style="italic">Every link degrades the signal; a systems engineer characterizes each sensor by a fixed vocabulary that propagates into budgets:</text>
<rect x="20" y="146" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-opacity="0.7"/>
<text x="28" y="155" font-size="7.8" fill="var(--info)" font-weight="700">Resolution</text>
<text x="28" y="164" font-size="6.8" fill="var(--text-muted)">smallest distinguishable change (spatial/spectral/force)</text>
<rect x="20" y="171" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-opacity="0.7"/>
<text x="28" y="180" font-size="7.8" fill="var(--info)" font-weight="700">Accuracy vs precision</text>
<text x="28" y="189" font-size="6.8" fill="var(--text-muted)">truth vs repeatability (calibration / noise)</text>
<rect x="20" y="196" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-opacity="0.7"/>
<text x="28" y="205" font-size="7.8" fill="var(--info)" font-weight="700">Noise and SNR</text>
<text x="28" y="214" font-size="6.8" fill="var(--text-muted)">bounds what any downstream algorithm can recover</text>
<rect x="20" y="221" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--warn)" stroke-opacity="0.7"/>
<text x="28" y="230" font-size="7.8" fill="var(--warn-text)" font-weight="700">Dynamic range</text>
<text x="28" y="239" font-size="6.8" fill="var(--text-muted)">span smallest to largest: the sun/shade problem</text>
<rect x="394" y="146" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--warn)" stroke-opacity="0.7"/>
<text x="402" y="155" font-size="7.8" fill="var(--warn-text)" font-weight="700">Bandwidth / latency</text>
<text x="402" y="164" font-size="6.8" fill="var(--text-muted)">spends the cycle-time budget (CEC-01); stales the target</text>
<rect x="394" y="171" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-opacity="0.7"/>
<text x="402" y="180" font-size="7.8" fill="var(--info)" font-weight="700">Field of view and range</text>
<text x="402" y="189" font-size="6.8" fill="var(--text-muted)">spatial extent and usable depth</text>
<rect x="394" y="196" width="364" height="20" rx="5" fill="var(--surface-2)" stroke="var(--border-strong)" stroke-opacity="0.7"/>
<text x="402" y="205" font-size="7.8" fill="var(--info)" font-weight="700">Field robustness</text>
<text x="402" y="214" font-size="6.8" fill="var(--text-muted)">dust, moisture, vibration, temperature, light</text>
<rect x="20" y="300" width="720" height="28" rx="7" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.5"/>
<text x="32" y="312" font-size="8.2" fill="var(--text-secondary)" font-weight="700">Sensor selection is the disciplined act of matching these characteristics to requirements,</text>
<text x="32" y="323" font-size="8" fill="var(--text-muted)">never choosing hardware before the requirement is quantified.</text>
</svg></div><figcaption><span class="fid">F-M3-1</span>The sensing chain. A physical property is transduced into a signal from which information is extracted, every link degrading the signal; each sensor is characterized by a fixed vocabulary that propagates into the budgets, with latency and dynamic range flagged for their direct budget consequences. The chapter's opening figure. Module 3, Section 6.1.</figcaption></figure></body></html>
