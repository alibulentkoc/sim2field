<circle cx="338" cy="134" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="329" cy="134" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="318" cy="121" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="318" cy="150" r="3" fill="var(--info)" fill-opacity="0.7"/>
<text x="310.0" y="101.0" font-size="6.6" fill="var(--info)" font-weight="anc=middle">demo: easy center (proves little)</text>
<path d="M 122,62 L 130,70 M 122,70 L 130,62" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 490,62 L 498,70 M 490,70 L 498,62" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 122,200 L 130,208 M 122,208 L 130,200" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 490,200 L 498,208 M 490,208 L 498,200" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 306.0,61 L 314.0,69 M 306.0,69 L 314.0,61" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 491,131.0 L 499,139.0 M 491,139.0 L 499,131.0" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 121,131.0 L 129,139.0 M 121,139.0 L 129,131.0" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 306.0,201 L 314.0,209 M 306.0,209 L 314.0,201" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 427.59999999999997,78.5 L 435.59999999999997,86.5 M 427.59999999999997,86.5 L 435.59999999999997,78.5" stroke="var(--danger)" stroke-width="1.6"/>
<path d="M 458.0,183.5 L 466.0,191.5 M 458.0,191.5 L 466.0,183.5" stroke="var(--danger)" stroke-width="1.6"/>
<text x="492" y="78" font-size="6.6" fill="var(--danger-text)" font-weight="end" text-anchor="end">adversarial: edges + corners</text>
<rect x="524" y="60" width="218" height="150" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="536" y="80" font-size="7.8" fill="var(--text-primary)" font-weight="700">Design tests to FAIL it:</text>
<text x="536" y="98" font-size="6.8" fill="var(--danger-text)">x steepest slope + payload</text>
<text x="536" y="113" font-size="6.8" fill="var(--danger-text)">x worst light, deepest shade</text>
<text x="536" y="128" font-size="6.8" fill="var(--danger-text)">x densest occlusion</text>
<text x="536" y="143" font-size="6.8" fill="var(--danger-text)">x most variable fruit</text>
<text x="536" y="158" font-size="6.8" fill="var(--danger-text)">x dustiest air, degraded airflow</text>
<text x="536" y="173" font-size="6.8" fill="var(--danger-text)">x most-worn state</text>
<text x="20" y="238" font-size="7.8" fill="var(--text-secondary)" font-weight="700">The field runs the adversarial test regardless, so the engineer must run it first: the difference between a demo and a proof (EI-14/EI-10).</text>
<text x="20" y="250" font-size="7.8" fill="var(--text-muted)">Find where it fails, then fix it or bound the envelope honestly. Section 6.5.</text>
</svg>