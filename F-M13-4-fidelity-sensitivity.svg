<svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fidelity-decision sensitivity: some decisions stabilize at a low fidelity rung (reach settles at the kinematic level and does not change higher up) while others keep changing until a high rung (grasp-will-not-bruise settles only at the contact/fluid level); the rung where a decision stabilizes is where fidelity investment and validation must go." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Where fidelity is binding: decision sensitivity</text>
<line x1="140" y1="66" x2="140" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="140.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">kinematic</text>
<line x1="242" y1="66" x2="242" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="242.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">dynamic</text>
<line x1="344" y1="66" x2="344" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="344.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">contact/fluid</text>
<line x1="446" y1="66" x2="446" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="446.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">sensor-in-loop</text>
<line x1="548" y1="66" x2="548" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="548.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">HIL</text>
<line x1="650" y1="66" x2="650" y2="220" stroke="var(--grid-line)" stroke-width="1"/>
<text x="650.0" y="234" font-size="6.4" fill="var(--text-muted)" text-anchor="middle">field</text>
<polyline points="140,97 242,97 344,97 446,97 548,97 650,97" fill="none" stroke="var(--accent)" stroke-width="2"/>
<text x="144.0" y="90.8" font-size="6.8" fill="var(--accent)">reach: stable at kinematic</text>
<circle cx="140" cy="97" r="4" fill="var(--accent)"/>
<polyline points="140,189 242,166 344,125 446,123 548,123 650,123" fill="none" stroke="var(--accent-2)" stroke-width="2"/>
<circle cx="344" cy="125" r="5" fill="var(--accent-2)"/>
<text x="350.0" y="126.52" font-size="6.8" fill="var(--accent-2)">grasp-no-bruise: binds at contact/fluid (CR-03)</text>
<text x="144.0" y="183.2" font-size="6.4" fill="var(--text-muted)">outcome still changing at low fidelity (over-trust risk)</text>
<line x1="140" y1="62" x2="140" y2="220" stroke="var(--border-strong)" stroke-width="1.4"/>
<line x1="140" y1="220" x2="650" y2="220" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="132" y="143.0" text-anchor="middle" font-size="7.6" fill="var(--text-muted)" transform="rotate(-90 132 143.0)">decision outcome</text>
<text x="395.0" y="248" font-size="8" fill="var(--text-muted)" text-anchor="middle">fidelity rung (cheap -> faithful)  -></text>
<rect x="668" y="70" width="76" height="90" rx="7" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="676" y="86" font-size="6.6" fill="var(--text-secondary)" font-weight="700">binding rung</text>
<text x="676" y="98" font-size="6" fill="var(--text-muted)">= where the</text>
<text x="676" y="107" font-size="6" fill="var(--text-muted)">outcome stops</text>
<text x="676" y="116" font-size="6" fill="var(--text-muted)">changing.</text>
<text x="676" y="132" font-size="6" fill="var(--text-muted)">put validation</text>
<text x="676" y="141" font-size="6" fill="var(--text-muted)">and investment</text>
<text x="676" y="150" font-size="6" fill="var(--text-muted)">there.</text>
<text x="20" y="256" font-size="7.8" fill="var(--text-muted)">Match fidelity to the decision: low fidelity for a fidelity-sensitive decision is over-trust; high fidelity for an insensitive one wastes effort. Section 6.4.</text>
</svg>