<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The safety reaction-time margin: after a hazard begins, the software path must detect and react before the time-to-harm deadline, while the physical bounds (relief and compliance) act almost immediately at physics speed, buying margin that software alone cannot guarantee." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Reaction-time margin: physics speed vs software speed</text>
<line x1="150" y1="180" x2="700" y2="180" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="425.0" y="204" font-size="8" fill="var(--text-muted)" text-anchor="middle">time after hazard onset -></text>
<line x1="150" y1="60" x2="150" y2="186" stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="3 3"/>
<text x="150" y="52" font-size="7.6" fill="var(--warn-text)" text-anchor="middle">hazard onset</text>
<line x1="623" y1="52" x2="623" y2="186" stroke="var(--danger)" stroke-width="1.6" stroke-dasharray="5 3"/>
<text x="623.0" y="46" font-size="8" fill="var(--danger-text)" font-weight="700" text-anchor="middle">T_harm (bruise / tip)</text>
<rect x="150" y="86" width="187" height="20" fill="var(--info)" fill-opacity="0.55" stroke="var(--info)"/>
<text x="243.5" y="100" font-size="7" fill="var(--text-on-accent)" text-anchor="middle">L_detect</text>
<rect x="337" y="86" width="154" height="20" fill="var(--warn)" fill-opacity="0.55" stroke="var(--warn)"/>
<text x="414.0" y="100" font-size="7" fill="var(--text-on-accent)" text-anchor="middle">L_react</text>
<text x="144" y="100" font-size="7.6" fill="var(--info)" text-anchor="end">software</text>
<line x1="491" y1="96" x2="623" y2="96" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 2"/>
<text x="557.0" y="82" font-size="6.8" fill="var(--accent)" text-anchor="middle">margin</text>
<rect x="150" y="126" width="33" height="20" fill="var(--accent)" fill-opacity="0.7" stroke="var(--accent)"/>
<text x="144" y="140" font-size="7.6" fill="var(--accent)" text-anchor="end">physics</text>
<text x="199.5" y="140" font-size="7" fill="var(--accent)">relief / compliance act (near-instant)</text>
<line x1="183" y1="136" x2="623" y2="136" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 2"/>
<text x="403.0" y="122" font-size="6.8" fill="var(--accent)" text-anchor="middle">large margin</text>
<text x="20" y="228" font-size="8" fill="var(--text-muted)">Require L_detect + L_react &lt;= T_harm. Physical bounds (mechanical relief M9, passive compliance EI-09) act at physics speed, not</text>
<text x="20" y="242" font-size="8" fill="var(--text-muted)">software speed, so they buy margin the software path cannot guarantee alone. M11 Section 7.4; M15 Section 6.4.</text>
</svg>