<text x="598" y="187" font-size="7.4" fill="var(--danger-text)" font-weight="700">break -&gt; it is 5's interface</text>
<text x="392" y="222" font-size="7.6" fill="var(--accent)" font-weight="700">A break localizes to the just-added subsystem: O(n) debug path.</text>
<text x="392" y="236" font-size="7.4" fill="var(--text-muted)">Each step verifies one interface and interaction before adding the next.</text>
<text x="20" y="270" font-size="8.2" fill="var(--text-secondary)">Incremental integration localizes the interaction that breaks and is far easier to debug (EI-13).</text>
<text x="20" y="283" font-size="8.2" fill="var(--text-muted)">The twin is the environment where this incremental composition happens first, before hardware.</text>
