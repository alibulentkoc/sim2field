<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three calibrations make a measurement mean something in the robot frame: intrinsic maps pixels to rays via the camera's internal model, extrinsic and hand-eye relate the sensors to each other and the camera to the manipulator so a detected fruit becomes a reachable target, and temporal synchronizes streams so fused measurements refer to the same instant; residual calibration error is a named term in the placement budget." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Calibration: measurements in the robot frame</text>
<text x="65" y="96" font-size="7.2" fill="var(--text-muted)" text-anchor="middle">pixel (u,v)</text>
<line x1="98" y1="92" x2="114" y2="92" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<rect x="116" y="72" width="150" height="40" rx="8" fill="var(--surface)" stroke="var(--info)" stroke-width="1.5"/>
<text x="191" y="90" font-size="8" fill="var(--info)" font-weight="700" text-anchor="middle">INTRINSIC</text>
<text x="191" y="104" font-size="6" fill="var(--text-muted)" text-anchor="middle">focal, principal pt, distortion</text>
<line x1="264" y1="92" x2="280" y2="92" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<text x="317" y="96" font-size="7.2" fill="var(--text-muted)" text-anchor="middle">ray</text>
<line x1="350" y1="92" x2="366" y2="92" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<rect x="368" y="72" width="150" height="40" rx="8" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="1.5"/>
<text x="443" y="90" font-size="8" fill="var(--accent-2)" font-weight="700" text-anchor="middle">EXTRINSIC + HAND-EYE</text>
<text x="443" y="104" font-size="6" fill="var(--text-muted)" text-anchor="middle">camera -> manipulator</text>
<line x1="516" y1="92" x2="532" y2="92" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#a)"/>
<text x="569" y="96" font-size="7.2" fill="var(--accent)" text-anchor="middle">robot frame target</text>
<rect x="30" y="140" width="700" height="40" rx="8" fill="var(--surface-2)" stroke="var(--warn)" stroke-opacity="0.6"/>
<text x="44" y="158" font-size="8" fill="var(--warn-text)" font-weight="700">TEMPORAL</text>
<text x="44" y="172" font-size="7" fill="var(--text-secondary)">synchronize streams so fused measurements refer to the same instant</text>
<text x="430" y="158" font-size="7" fill="var(--text-muted)">on a moving platform, a latency error</text>
<text x="430" y="171" font-size="7" fill="var(--text-muted)">masquerades as a position error (sigma_sync)</text>
<text x="20" y="206" font-size="7.8" fill="var(--text-secondary)" font-weight="700">Residual calibration error is not incidental: it is a named term in the placement error budget (sigma_cal, sigma_he, sigma_sync; CEC-03).</text>
<text x="20" y="220" font-size="7.8" fill="var(--text-muted)">Uncalibrated frames are a classic localization and integration failure. Section 6.7.</text>
</svg>