<svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Adversarial validation deliberately concentrates tests at the envelope's edges and corners, the steepest slope, worst light, densest occlusion, most variable fruit, dustiest air, most-worn state, rather than clustering in the easy center like a demo; you design tests to fail the machine, find where it fails, and either fix it or bound the envelope honestly." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Adversarial envelope coverage (test the edges)</text>
<rect x="120" y="60" width="380" height="150" rx="6" fill="var(--surface)" stroke="var(--border-strong)" stroke-width="1.4"/>
<text x="310.0" y="52" font-size="7" fill="var(--text-muted)" font-weight="anc=middle">operating envelope</text>
<text x="114" y="224" font-size="6.6" fill="var(--text-muted)" text-anchor="middle">easy</text>
<text x="500" y="224" font-size="6.6" fill="var(--danger-text)" font-weight="end" text-anchor="end">slope / light / occlusion / dust / wear -> harsh</text>
<circle cx="295" cy="137" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="303" cy="139" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="317" cy="118" r="3" fill="var(--info)" fill-opacity="0.7"/>
<circle cx="283" cy="148" r="3" fill="var(--info)" fill-opacity="0.7"/>
