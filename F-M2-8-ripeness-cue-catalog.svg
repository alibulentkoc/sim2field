<svg viewBox="0 0 760 378" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ripeness cue catalog: five physical cues of watermelon ripeness, each mapped to its matched sensing modality (optical, contextual, acoustic, or spectral). Ripeness is multi-cue, so later modules fuse modalities and learn from data." font-family="'IBM Plex Mono',monospace">
<defs><marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="10" y="40" font-size="10" fill="var(--text-muted)" letter-spacing=".04em">RIPENESS CUE (the fruit talking)</text>
<text x="474" y="40" font-size="10" fill="var(--text-muted)" letter-spacing=".04em">MATCHED SENSING MODALITY</text>
<line x1="6" y1="48" x2="754" y2="48" stroke="var(--border)" stroke-width="1"/>
<rect x="6" y="58" width="438" height="42" rx="8" fill="var(--surface)" stroke="var(--border)"/>
<text x="20" y="77" font-size="11" fill="var(--text-primary)" font-weight="700">Ground-spot color</text>
<text x="20" y="92" font-size="8.8" fill="var(--text-muted)">shifts white -> creamy yellow where the fruit rested on soil</text>
<line x1="448" y1="79.0" x2="466" y2="79.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#am)"/>
<rect x="470" y="61" width="284" height="36" rx="7" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)"/>
<text x="612.0" y="81.0" text-anchor="middle" font-size="11" fill="var(--info)" font-weight="700">Optical / color</text>
<rect x="6" y="108" width="438" height="42" rx="8" fill="var(--surface)" stroke="var(--border)"/>
<text x="20" y="127" font-size="11" fill="var(--text-primary)" font-weight="700">Tendril / vine dieback</text>
<text x="20" y="142" font-size="8.8" fill="var(--text-muted)">the tendril nearest the fruit browns as it matures</text>
<line x1="448" y1="129.0" x2="466" y2="129.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#am)"/>
<rect x="470" y="111" width="284" height="36" rx="7" fill="var(--accent-2)" fill-opacity="0.12" stroke="var(--accent-2)"/>
<text x="612.0" y="131.0" text-anchor="middle" font-size="11" fill="var(--accent-2)" font-weight="700">Visual / contextual</text>
<rect x="6" y="158" width="438" height="42" rx="8" fill="var(--surface)" stroke="var(--border)"/>
<text x="20" y="177" font-size="11" fill="var(--text-primary)" font-weight="700">Acoustic response (thump)</text>
<text x="20" y="192" font-size="8.8" fill="var(--text-muted)">the pressurized shell's resonance changes with maturity</text>
<line x1="448" y1="179.0" x2="466" y2="179.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#am)"/>
<rect x="470" y="161" width="284" height="36" rx="7" fill="var(--warn)" fill-opacity="0.12" stroke="var(--warn)"/>
<text x="612.0" y="181.0" text-anchor="middle" font-size="11" fill="var(--warn)" font-weight="700">Acoustic</text>
<rect x="6" y="208" width="438" height="42" rx="8" fill="var(--surface)" stroke="var(--border)"/>
<text x="20" y="227" font-size="11" fill="var(--text-primary)" font-weight="700">Density / internal structure</text>
<text x="20" y="242" font-size="8.8" fill="var(--text-muted)">correlates with sugar and water content</text>
<line x1="448" y1="229.0" x2="466" y2="229.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#am)"/>
<rect x="470" y="211" width="284" height="36" rx="7" fill="var(--accent)" fill-opacity="0.12" stroke="var(--accent)"/>
<text x="612.0" y="231.0" text-anchor="middle" font-size="11" fill="var(--accent)" font-weight="700">Spectral / NIR</text>
<rect x="6" y="258" width="438" height="42" rx="8" fill="var(--surface)" stroke="var(--border)"/>
<text x="20" y="277" font-size="11" fill="var(--text-primary)" font-weight="700">Rind sheen and surface texture</text>
<text x="20" y="292" font-size="8.8" fill="var(--text-muted)">surface reflectance and texture change</text>
<line x1="448" y1="279.0" x2="466" y2="279.0" stroke="var(--border-strong)" stroke-width="1.3" marker-end="url(#am)"/>
<rect x="470" y="261" width="284" height="36" rx="7" fill="var(--info)" fill-opacity="0.12" stroke="var(--info)"/>
<text x="612.0" y="281.0" text-anchor="middle" font-size="11" fill="var(--info)" font-weight="700">Optical</text>
<rect x="6" y="326" width="748" height="44" rx="8" fill="var(--surface-2)" stroke="var(--border)"/>
<text x="20" y="344" font-size="9.5" fill="var(--text-secondary)">Ripeness is probabilistic and multi-cue: no single channel is decisive.</text>
<text x="20" y="359" font-size="9" fill="var(--text-muted)">So M4 learns from data and M5 fuses modalities; this module catalogs the cues to design the M3 sensing suite and the M4 dataset.</text>
</svg>