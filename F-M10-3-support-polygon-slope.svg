<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Support polygon and centre of gravity on a side slope: the machine stays upright while the CoG projects inside the wheel footprint; tip-over impends as the projection reaches the downhill edge, and an arm swing shifts the CoG laterally, eroding the margin further." font-family="'IBM Plex Mono',monospace">
