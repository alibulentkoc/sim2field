<svg viewBox="0 0 760 265" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The development-versus-runtime AI boundary: the model is built off-robot at development time (capture, annotation, synthetic generation, training, evaluation, compilation) and delivered as a compiled artifact, while at runtime the on-robot machine only loads it and runs inference with no learning and no network, the AI-specific view of the no-cloud boundary." font-family="'IBM Plex Mono',monospace">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--border-strong)"/></marker></defs>
<text x="20" y="26" font-size="11" fill="var(--text-primary)" font-weight="700" font-family="'Space Grotesk',sans-serif">Development vs runtime AI boundary</text>
<rect x="30" y="52" width="340" height="180" rx="10" fill="var(--surface)" stroke="var(--info)" stroke-width="1.6"/>
<text x="46" y="72" font-size="9.5" fill="var(--info)" font-weight="700">DEVELOPMENT (off-robot)</text>
<text x="46" y="85" font-size="6.6" fill="var(--text-muted)">at development time, iterated freely</text>
<rect x="46" y="98" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="54" y="111" font-size="7.2" fill="var(--text-secondary)">real capture + annotation (M4)</text>
<rect x="46" y="123" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="54" y="136" font-size="7.2" fill="var(--text-secondary)">synthetic generation (twin, M3)</text>
<rect x="46" y="148" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="54" y="161" font-size="7.2" fill="var(--text-secondary)">training: imitation + RL (M7)</text>
<rect x="46" y="173" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="54" y="186" font-size="7.2" fill="var(--text-secondary)">evaluation + operating point</text>
<rect x="46" y="198" width="308" height="19" rx="5" fill="var(--surface-2)" stroke="var(--info)" stroke-opacity="0.4"/>
<text x="54" y="211" font-size="7.2" fill="var(--text-secondary)">model compilation (TensorRT, M6)</text>
<rect x="400" y="52" width="330" height="180" rx="10" fill="var(--surface)" stroke="var(--accent)" stroke-width="1.6"/>
<text x="416" y="72" font-size="9.5" fill="var(--accent)" font-weight="700">RUNTIME (on-robot, in the loop)</text>
<text x="416" y="85" font-size="6.6" fill="var(--text-muted)">closes on-robot, no network, no learning</text>
<rect x="416" y="98" width="298" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="424" y="111" font-size="7.2" fill="var(--text-secondary)">load compiled model</text>
<rect x="416" y="123" width="298" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="424" y="136" font-size="7.2" fill="var(--text-secondary)">inference: detect / segment / ripeness</text>
<rect x="416" y="148" width="298" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="424" y="161" font-size="7.2" fill="var(--text-secondary)">feed localization + decision</text>
<rect x="416" y="173" width="298" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="424" y="186" font-size="7.2" fill="var(--text-secondary)">fixed weights (no training)</text>
<rect x="416" y="198" width="298" height="19" rx="5" fill="var(--surface-2)" stroke="var(--accent)" stroke-opacity="0.4"/>
<text x="424" y="211" font-size="7.2" fill="var(--text-secondary)">deterministic latency (CEC-01)</text>
<line x1="388" y1="58" x2="388" y2="226" stroke="var(--danger)" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="416" y1="222" x2="358" y2="222" stroke="var(--info)" stroke-width="1.6" marker-end="url(#a)"/>
<text x="392" y="218" font-size="6.4" fill="var(--info)">compiled model artifact - one way</text>
<text x="20" y="252" font-size="7.6" fill="var(--text-muted)">The AI lifecycle obeys the no-cloud boundary (CEC-04): training and data generation are development-time; only inference runs at runtime. Section 17.</text>
</svg>